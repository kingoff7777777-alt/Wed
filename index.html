<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>부이뒤칸 - Website</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* 🌈 RGB */
body::before {
  content: "";
  position: fixed;
  width: 300%;
  height: 300%;
  background: linear-gradient(45deg, red, orange, yellow, green, cyan, blue, violet);
  background-size: 400% 400%;
  animation: rgb 10s infinite;
  opacity: 0.12;
  z-index: -1;
}
@keyframes rgb {
  0% { background-position: 0% }
  50% { background-position: 100% }
  100% { background-position: 0% }
}

/* CARD */
.card {
  width: 380px;
  max-width: 90%;
  padding: 20px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  text-align: center;
}

img {
  width: 100%;
  border-radius: 15px;
}

/* VISUALIZER */
.audio-box {
  display: flex;
  justify-content: center;
  align-items: flex-end;
  gap: 4px;
  height: 40px;
}

.bar {
  width: 6px;
  height: 5px;
  border-radius: 3px;
}

/* 🌈 7 màu */
.bar:nth-child(1){background:red;}
.bar:nth-child(2){background:orange;}
.bar:nth-child(3){background:yellow;}
.bar:nth-child(4){background:lime;}
.bar:nth-child(5){background:cyan;}
.bar:nth-child(6){background:blue;}
.bar:nth-child(7){background:violet;}

.lang button {
  margin: 5px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="card">

  <img src="https://i.imgur.com/4AcFg90.webp">

  <h1>부이뒤칸</h1>
  <p id="desc"></p>

  <h3 id="friendTitle"></h3>
  <p id="friend"></p>

  <div class="lang">
    <button onclick="setLang('vi')">🇻🇳</button>
    <button onclick="setLang('kr')">🇰🇷</button>
    <button onclick="setLang('en')">🇺🇸</button>
  </div>

  <button onclick="toggleMusic()">🎧 Play</button>

  <div class="audio-box">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div>
  </div>

  <p id="countup"></p>
  <p id="koreaTime"></p>

</div>

<audio id="music" crossorigin="anonymous" loop>
  <source src="https://raw.githubusercontent.com/kingoff7777777-alt/music/main/see-tinh-taivideoaz.mp3">
</audio>

<script>

/* 🌐 LANGUAGE */
const data = {
  vi: {
    desc: "Tôi là 부이뒤칸, sinh năm 2010, đến từ Việt Nam.",
    friendTitle: "Bạn của tôi",
    friend: "문준우, sinh năm 2011, đến từ Hàn Quốc"
  },
  kr: {
    desc: "저는 부이뒤칸입니다. 2010년생, 베트남 출신입니다.",
    friendTitle: "내 친구",
    friend: "문준우, 2011년생, 한국 출신"
  },
  en: {
    desc: "I am 부이뒤칸, born in 2010, from Vietnam.",
    friendTitle: "My friend",
    friend: "Moon Joonwoo, born in 2011, from Korea"
  }
};

function setLang(lang){
  document.getElementById("desc").innerText = data[lang].desc;
  document.getElementById("friendTitle").innerText = data[lang].friendTitle;
  document.getElementById("friend").innerText = data[lang].friend;
}

/* 🎵 AUDIO FIX CHUẨN */
const audio = document.getElementById("music");
const bars = document.querySelectorAll(".bar");

let ctx, analyser, source;

/* 👆 click 1 lần để unlock audio */
document.body.addEventListener("click", async () => {
  if (!ctx) {
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = ctx.createAnalyser();

    source = ctx.createMediaElementSource(audio);
    source.connect(analyser);
    analyser.connect(ctx.destination);

    analyser.fftSize = 64;
  }

  await ctx.resume();
  audio.play();

}, { once: true });

function toggleMusic(){
  if (!ctx) return;

  if (audio.paused) {
    audio.play();
  } else {
    audio.pause();
  }
}

/* 🎶 VISUALIZER FIX CHẠY 100% */
function animate(){
  requestAnimationFrame(animate);

  if (!analyser) return;

  const dataArray = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(dataArray);

  bars.forEach((bar, i)=>{
    const val = dataArray[i] || 0;
    bar.style.height = (val / 255 * 40) + "px";
  });
}
animate();

/* ⏳ TIME */
const start = new Date("2026-03-05");

setInterval(()=>{
  let now = new Date();
  let d = Math.floor((now-start)/86400000);
  document.getElementById("countup").innerText = d + " ngày";

  const kr = new Intl.DateTimeFormat("vi-VN", {
    timeZone:"Asia/Seoul",
    dateStyle:"medium",
    timeStyle:"medium"
  }).format(new Date());

  document.getElementById("koreaTime").innerText = kr;

},1000);

setLang("vi");

</script>

</body>
</html>
