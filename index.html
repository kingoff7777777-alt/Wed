<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>부이뒤칸 - Website</title>
<meta name="description" content="Trang cá nhân của 부이뒤칸">

<style>

/* ===== BODY ===== */
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  overflow-x: hidden;
}

/* 🌈 RGB */
body::before {
  content: "";
  position: fixed;
  width: 300%;
  height: 300%;
  background: linear-gradient(45deg, red, orange, yellow, green, cyan, blue, violet);
  background-size: 400% 400%;
  animation: rgb 10s infinite;
  opacity: 0.12;
  z-index: -1;
}
@keyframes rgb {
  0% { background-position: 0% }
  50% { background-position: 100% }
  100% { background-position: 0% }
}

/* NAV */
.nav {
  position: fixed;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 15px;
  background: rgba(0,0,0,0.5);
  padding: 10px 20px;
  border-radius: 20px;
  z-index: 999;
}
.nav a {
  color: #00ffe1;
  text-decoration: none;
}

/* SECTION */
.section {
  display: none;
  padding: 100px 20px;
  text-align: center;
}
.active {
  display: block;
}

/* CARD */
.card {
  max-width: 350px;
  margin: auto;
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 20px;
}

/* IMG */
img {
  width: 100%;
  border-radius: 15px;
}

/* GALLERY */
.gallery {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 10px;
}

/* VISUALIZER */
.audio-box {
  display: flex;
  justify-content: center;
  gap: 4px;
  height: 40px;
}
.bar {
  width: 5px;
  background: cyan;
}

/* LANG */
.lang button {
  margin: 5px;
  cursor: pointer;
}

</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <a onclick="show('home')">🏠 Home</a>
  <a onclick="show('about')">👤 About</a>
  <a onclick="show('gallery')">🖼 Gallery</a>
</div>

<!-- HOME -->
<div id="home" class="section active">
  <div class="card">

    <img src="https://i.imgur.com/4AcFg90.webp">

    <h1>부이뒤칸</h1>
    <p id="desc"></p>

    <h3 id="friendTitle"></h3>
    <p id="friend"></p>

    <!-- LANG -->
    <div class="lang">
      <button onclick="setLang('vi')">🇻🇳</button>
      <button onclick="setLang('kr')">🇰🇷</button>
      <button onclick="setLang('en')">🇺🇸</button>
    </div>

    <button onclick="toggleMusic()">🎧 Play</button>

    <!-- VISUAL -->
    <div class="audio-box">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>

    <!-- TIME -->
    <p id="countup"></p>
    <p id="koreaTime"></p>

  </div>
</div>

<!-- ABOUT -->
<div id="about" class="section">
  <h1>Giới thiệu</h1>
  <p>Tôi là 부이뒤칸, sinh năm 2010, đến từ Việt Nam.</p>
</div>

<!-- GALLERY -->
<div id="gallery" class="section">
  <h1>Hình ảnh</h1>
  <div class="gallery">
    <img src="https://i.imgur.com/4AcFg90.webp">
    <img src="https://i.imgur.com/4AcFg90.webp">
  </div>
</div>

<audio id="music" crossorigin="anonymous" loop>
  <source src="https://raw.githubusercontent.com/kingoff7777777-alt/music/main/see-tinh-taivideoaz.mp3">
</audio>

<script>

/* NAV SWITCH */
function show(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* LANGUAGE */
const data = {
  vi: {
    desc: "Tôi là 부이뒤칸",
    friendTitle: "Bạn của tôi",
    friend: "문준우 (2011)"
  },
  kr: {
    desc: "저는 부이뒤칸입니다",
    friendTitle: "내 친구",
    friend: "문준우"
  },
  en: {
    desc: "I am 부이뒤칸",
    friendTitle: "My friend",
    friend: "Joonwoo"
  }
};

function setLang(l){
  document.getElementById("desc").innerText = data[l].desc;
  document.getElementById("friendTitle").innerText = data[l].friendTitle;
  document.getElementById("friend").innerText = data[l].friend;
}

/* AUDIO */
const audio = document.getElementById("music");
let ctx, analyser, src;

function initAudio(){
  if(ctx) return;
  ctx = new AudioContext();
  analyser = ctx.createAnalyser();
  src = ctx.createMediaElementSource(audio);
  src.connect(analyser);
  analyser.connect(ctx.destination);
  analyser.fftSize = 64;
}

function toggleMusic(){
  initAudio();
  if(audio.paused){
    audio.play();
    ctx.resume();
  } else audio.pause();
}

/* VISUAL */
const bars = document.querySelectorAll(".bar");

function anim(){
  requestAnimationFrame(anim);
  if(!analyser) return;
  const data = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);
  bars.forEach((b,i)=> b.style.height = (data[i]/255*40)+"px");
}
anim();

/* TIME */
const start = new Date("2026-03-05");

setInterval(()=>{
  let now = new Date();
  let d = Math.floor((now-start)/86400000);
  document.getElementById("countup").innerText = d+" ngày";

  const kr = new Intl.DateTimeFormat("vi-VN", {
    timeZone:"Asia/Seoul",
    dateStyle:"medium",
    timeStyle:"medium"
  }).format(new Date());

  document.getElementById("koreaTime").innerText = kr;

},1000);

setLang("vi");

</script>

</body>
</html>
