<script>
const data = {
  vi: {
    desc: "Tôi là 부이뒤칸, sinh năm 2010, đến từ Việt Nam.",
    friendTitle: "Bạn của tôi",
    friend: "문준우, sinh năm 2011, đến từ Hàn Quốc"
  },
  kr: {
    desc: "저는 부이뒤칸입니다. 2010년생, 베트남 출신입니다.",
    friendTitle: "내 친구",
    friend: "문준우, 2011년생, 한국 출신"
  },
  en: {
    desc: "I am 부이뒤칸, born in 2010, from Vietnam.",
    friendTitle: "My friend",
    friend: "Moon Joonwoo, born in 2011, from Korea"
  }
};

function setLang(lang){
  document.getElementById("desc").innerText = data[lang].desc;
  document.getElementById("friendTitle").innerText = data[lang].friendTitle;
  document.getElementById("friend").innerText = data[lang].friend;
}

const audio = document.getElementById("music");
const bars = document.querySelectorAll(".bar");

let ctx, analyser, source;

function startSite(){
  document.getElementById("welcome").style.display = "none";

  if (!ctx) {
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = ctx.createAnalyser();
    source = ctx.createMediaElementSource(audio);
    source.connect(analyser);
    analyser.connect(ctx.destination);
    analyser.fftSize = 64;
  }

  ctx.resume();
  audio.play();
}

function toggleMusic(){
  if (!ctx) return;
  if (audio.paused) audio.play();
  else audio.pause();
}

function animate(){
  requestAnimationFrame(animate);
  if (!analyser) return;

  const dataArr = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(dataArr);

  bars.forEach((bar, i)=>{
    bar.style.height = (dataArr[i] / 255 * 40) + "px";
  });
}
animate();

const start = new Date("2026-03-05");

setInterval(()=>{
  let now = new Date();
  let d = Math.floor((now-start)/86400000);
  document.getElementById("countup").innerText = d + " days";

  const kr = new Intl.DateTimeFormat("en-US", {
    timeZone:"Asia/Seoul",
    dateStyle:"medium",
    timeStyle:"medium"
  }).format(new Date());

  document.getElementById("koreaTime").innerText = kr;

},1000);

setLang("vi");
</script>
