function setLang(l){
localStorage.setItem(“site_lang”,l);
const t=I18N[l];
document.getElementById(“nt-home”).textContent=t.nav_home;
document.getElementById(“nt-album”).textContent=t.nav_album;
document.getElementById(“nt-chat”).textContent=t.nav_chat;
document.getElementById(“nt-login”).textContent=t.nav_login;

document.getElementById(“w-btn”).textContent=t.w_btn;

document.getElementById(“friendTitle”).textContent=t.friend_title;
document.getElementById(“friend”).textContent=t.friend;
document.getElementById(“days-label”).textContent=t.days;
document.getElementById(“changeBtn”).textContent=t.change_song;
[“vi”,“kr”,“en”].forEach(x=>document.getElementById(“lf-”+x).classList.toggle(“on”,x===l));
}

const tracks=[
{src:“https://raw.githubusercontent.com/kingoff7777777-alt/music/main/see-tinh-taivideoaz.mp3”,name:“🎵 See Tình”},
{src:“https://raw.githubusercontent.com/kingoff7777777-alt/music/refs/heads/main/Don%20Miguelo%20-%20Y%20Que%20Fue%3F%20%5BAudio%20Oficial%5D-482307798.mp3”,name:“🎵 Y Que Fue?”}
];
const audio=document.getElementById(“music”);
const bars=document.querySelectorAll(”.bar”);
const playBtn=document.getElementById(“playBtn”);
let ctx,analyser,source,cur=0,unlocked=false;

function loadTrack(i){cur=i;audio.src=tracks[i].src;document.getElementById(“trackName”).textContent=tracks[i].name;document.querySelectorAll(”.track-dot”).forEach((d,j)=>d.classList.toggle(“active”,j===i));}

function startSite(){
// Đóng popup NGAY, không phụ thuộc vào audio
const w=document.getElementById(“welcome”);
if(w){w.style.opacity=“0”;setTimeout(()=>{w.style.display=“none”;},400);}
if(unlocked)return;unlocked=true;
// Khởi động audio trong try/catch
try{
ctx=new(window.AudioContext||window.webkitAudioContext)();
analyser=ctx.createAnalyser();source=ctx.createMediaElementSource(audio);
source.connect(analyser);analyser.connect(ctx.destination);analyser.fftSize=64;
loadTrack(0);
ctx.resume().then(()=>audio.play().then(()=>{playBtn.textContent=“⏸ Pause”;playBtn.classList.add(“playing”);}).catch(()=>{}));
}

audio.addEventListener(“ended”,()=>{const n=(cur+1)%tracks.length;loadTrack(n);ctx.resume().then(()=>audio.play());});

function toggleMusic(){
if(!unlocked){startSite();return;}
if(audio.paused){ctx.resume().then(()=>audio.play());playBtn.textContent=“⏸ Pause”;playBtn.classList.add(“playing”);}
else{audio.pause();playBtn.textContent=“▶ Play”;playBtn.classList.remove(“playing”);}
}

function nextTrack(){
if(!unlocked){startSite();return;}
const n=(cur+1)%tracks.length;loadTrack(n);
ctx.resume().then(()=>audio.play().then(()=>{playBtn.textContent=“⏸ Pause”;playBtn.classList.add(“playing”);}));
}

function animate(){requestAnimationFrame(animate);if(!analyser)return;const a=new Uint8Array(analyser.frequencyBinCount);analyser.getByteFrequencyData(a);bars.forEach((b,i)=>{b.style.height=(a[i]/255*28+3)+“px”;});}
animate();

const start=new Date(“2026-03-05”);
setInterval(()=>{
document.getElementById(“countup”).innerText=Math.floor((new Date()-start)/86400000);
document.getElementById(“koreaTime”).innerText=new Intl.DateTimeFormat(“en-US”,{timeZone:“Asia/Seoul”,hour:“2-digit”,minute:“2-digit”,second:“2-digit”}).format(new Date());
},1000);

setLang(localStorage.getItem(“site_lang”)||“vi”);
</script>

._bav{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#a855f7,#38bdf8);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
._bav._bme{background:linear-gradient(135deg,#ff6eb4,#a855f7);}
._bbl{max-width:78%;padding:7px 11px;border-radius:14px;font-family:'Nunito',sans-serif;font-size:13px;line-height:1.5;word-break:break-word;white-space:pre-wrap;}
._bbl._bai{background:#1c1535;border-bottom-left-radius:3px;color:#f0eaff;}
._bbl._bme2{background:linear-gradient(135deg,#a855f7,#ff6eb4);border-bottom-right-radius:3px;color:#fff;}
._bbl._bthink{color:rgba(240,234,255,0.4);font-style:italic;}
._btm{font-size:9px;color:rgba(240,234,255,0.3);margin-top:1px;padding:0 2px;}
._brow._bme ._btm{text-align:right;}
#_bot_inp_w{padding:8px 10px;background:#0f0a1e;border-top:1px solid rgba(255,255,255,0.06);display:flex;gap:6px;align-items:center;}
#_bot_inp{flex:1;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:50px;color:#f0eaff;padding:8px 13px;font-family:'Nunito',sans-serif;font-size:16px;outline:none;-webkit-appearance:none;}
#_bot_inp:focus{border-color:rgba(168,85,247,0.5);}
#_bot_send{background:linear-gradient(135deg,#a855f7,#38bdf8);color:#fff;border:none;width:36px;height:36px;border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
#_bot_send:disabled{opacity:.5;cursor:not-allowed;}
#_bot_pw{font-family:'Nunito',sans-serif;font-size:9px;color:rgba(240,234,255,0.2);text-align:center;padding:4px 0;background:#0f0a1e;}

document.head.appendChild(s);

// HTML
const w=document.createElement("div");
const lang=getLang();
w.innerHTML=`
<button id="_bot_btn">🤖</button>
<div id="_bot_win">
  <div id="_bot_hd">
    <div id="_bot_av">🤖</div>
    <div><div id="_bot_nm">AI Assistant</div><div id="_bot_st">● Online</div></div>
    <button id="_bot_cl">✕</button>
  </div>
  <div id="_bot_msgs"></div>
  <div id="_bot_inp_w">
    <input id="_bot_inp" placeholder="${PH[lang]}">
    <button id="_bot_send">➤</button>
  </div>
  <div id="_bot_pw">Powered by Google Gemini</div>
</div>`;
document.body.appendChild(w);

const btn=document.getElementById("_bot_btn");
const win=document.getElementById("_bot_win");
const msgs=document.getElementById("_bot_msgs");
const inp=document.getElementById("_bot_inp");
const send=document.getElementById("_bot_send");
document.getElementById("_bot_cl").onclick=toggle;
btn.onclick=toggle;

function toggle(){
  open=!open;
  win.classList.toggle("show",open);
  btn.textContent=open?"✕":"🤖";
  if(open) inp.focus();
}

function addMsg(text,role,thinking=false){
  const row=document.createElement("div");
  row.className="_brow"+(role==="user"?" _bme":"");
  const t=new Date().toLocaleTimeString("vi-VN",{hour:"2-digit",minute:"2-digit"});
  row.innerHTML=`
    <div class="_bav ${role==="user"?"_bme":""}">
      ${role==="user"?"👤":"🤖"}
    </div>
    <div>
      <div class="_bbl ${role==="user"?"_bme2":"_bai"}${thinking?" _bthink":""}">${text}</div>
      <div class="_btm">${t}</div>
    </div>`;
  msgs.appendChild(row);
  msgs.scrollTop=msgs.scrollHeight;
  return row;
}

// Tin chào
const l=getLang();
addMsg(GREET[l]||GREET.vi,"ai");

async function doSend(){
  const text=inp.value.trim(); if(!text) return;
  inp.value=""; send.disabled=true;
  const l=getLang();
  addMsg(text,"user");
  history.push({role:"user",parts:[{text}]});
  const thinking=addMsg(l==="kr"?"생각 중...":l==="en"?"Thinking...":"Đang suy nghĩ...","ai",true);
  try{
    const body={
      contents:[
        {role:"user",parts:[{text:SYSTEM[l]||SYSTEM.vi}]},
        ...history.slice(-8)
      ],
      generationConfig:{maxOutputTokens:300,temperature:0.8}
    };
    const res=await fetch(GEMINI_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    const data=await res.json();
    const reply=data.candidates?.[0]?.content?.parts?.[0]?.text||ERR[l];
    const bubble=thinking.querySelector("._bbl");
    bubble.textContent=reply;
    bubble.classList.remove("_bthink");
    history.push({role:"model",parts:[{text:reply}]});
  }catch(e){
    const bubble=thinking.querySelector("._bbl");
    bubble.textContent=ERR[getLang()];
    bubble.classList.remove("_bthink");
  }
  send.disabled=false;
  msgs.scrollTop=msgs.scrollHeight;
}

send.onclick=doSend;
inp.onkeydown=e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();doSend();}};
})();
</script>

<script src="bot.js"></script>
