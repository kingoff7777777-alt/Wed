<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat | iprights.asia</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--pink:#ff6eb4;--purple:#a855f7;--blue:#38bdf8;--green:#34d399;--bg:#0f0a1e;--card:#16112b;--card2:#1c1535;--border:rgba(255,255,255,0.08);--text:#f0eaff;--muted:rgba(240,234,255,0.5);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
body::before{content:'';position:fixed;width:400px;height:400px;border-radius:50%;background:var(--purple);filter:blur(100px);opacity:0.08;top:-150px;left:-150px;pointer-events:none;z-index:0;}
nav{display:flex;justify-content:center;gap:4px;padding:10px 16px;background:rgba(15,10,30,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);flex-shrink:0;position:relative;z-index:10;}
.nav-a{color:var(--muted);text-decoration:none;font-size:12px;font-weight:800;padding:7px 16px;border-radius:50px;transition:all .25s;border:1px solid transparent;}
.nav-a:hover{color:var(--text);background:rgba(255,255,255,0.07);}
.nav-a.active{color:#fff;background:linear-gradient(135deg,var(--purple),var(--pink));box-shadow:0 4px 20px rgba(168,85,247,0.4);}

/* LAYOUT */
.chat-layout{display:flex;flex:1;overflow:hidden;position:relative;z-index:1;}

/* SIDEBAR */
.sidebar{width:260px;background:rgba(22,17,43,0.95);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.sidebar-header{padding:16px;border-bottom:1px solid var(--border);}
.sidebar-title{font-size:13px;font-weight:800;color:var(--purple);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;}
.my-name{font-size:14px;font-weight:700;}
.user-list{flex:1;overflow-y:auto;padding:8px;}
.user-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:14px;cursor:pointer;transition:background .2s;position:relative;}
.user-item:hover{background:rgba(255,255,255,0.05);}
.user-item.active{background:rgba(168,85,247,0.12);border:1px solid rgba(168,85,247,0.2);}
.user-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--pink));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;flex-shrink:0;}
.user-info{flex:1;min-width:0;}
.user-name{font-size:13px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-last{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.online-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0;}
.unread-badge{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;font-size:10px;font-weight:800;padding:2px 7px;border-radius:50px;flex-shrink:0;}

/* CHAT AREA */
.chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.chat-header{padding:14px 20px;background:rgba(22,17,43,0.9);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;}
.chat-header-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--pink));display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;}
.chat-header-name{font-size:15px;font-weight:800;}
.chat-header-status{font-size:11px;color:var(--green);}
.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px;}
.msg-row{display:flex;align-items:flex-end;gap:8px;}
.msg-row.me{flex-direction:row-reverse;}
.msg-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--green));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;}
.msg-avatar.me-av{background:linear-gradient(135deg,var(--purple),var(--pink));}
.bubble{max-width:70%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.5;word-break:break-word;}
.bubble.them{background:var(--card2);border-bottom-left-radius:4px;}
.bubble.me{background:linear-gradient(135deg,var(--purple),var(--pink));border-bottom-right-radius:4px;}
.bubble-time{font-size:10px;color:var(--muted);margin-top:2px;text-align:right;}
.bubble.them .bubble-time{text-align:left;}

/* INPUT */
.chat-input{padding:12px 16px;background:rgba(22,17,43,0.95);border-top:1px solid var(--border);display:flex;gap:10px;flex-shrink:0;}
.chat-input input{flex:1;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:50px;color:var(--text);padding:10px 18px;font-family:'Nunito',sans-serif;font-size:14px;outline:none;transition:border-color .2s;}
.chat-input input:focus{border-color:rgba(168,85,247,0.5);}
.send-btn{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;border:none;width:44px;height:44px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s;flex-shrink:0;}
.send-btn:hover{transform:scale(1.08);}

/* No chat selected */
.no-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);gap:12px;}
.no-chat-icon{font-size:48px;}
.no-chat-text{font-size:14px;font-weight:600;}

/* Login prompt */
.login-prompt{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.login-prompt h2{font-size:22px;font-weight:900;background:linear-gradient(135deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.login-prompt p{color:var(--muted);font-size:14px;}
.btn-login{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;border:none;padding:12px 28px;border-radius:50px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;}

/* Mobile sidebar toggle */
@media(max-width:600px){
  .sidebar{position:fixed;left:-260px;top:0;bottom:0;z-index:100;transition:left .3s;}
  .sidebar.open{left:0;}
  .mob-toggle{display:flex;}
}
.mob-toggle{display:none;background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;padding:4px;}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-a">🏠 Home</a>
  <a href="album.html" class="nav-a">📸 Album</a>
  <a href="chat.html" class="nav-a active">💬 Chat</a>
  <span id="navRight"></span>
</nav>

<div class="chat-layout" id="chatLayout">
  <!-- Sidebar users -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">💬 Tin nhắn</div>
      <div class="my-name" id="myName">...</div>
    </div>
    <div class="user-list" id="userList">
      <div style="padding:20px;text-align:center;color:var(--muted);font-size:13px;">Đang tải...</div>
    </div>
  </div>

  <!-- Chat area -->
  <div class="chat-area" id="chatArea">
    <div class="no-chat" id="noChat">
      <div class="no-chat-icon">💬</div>
      <div class="no-chat-text">Chọn người để bắt đầu chat</div>
    </div>

    <div id="chatBox" style="display:none;flex:1;display:none;flex-direction:column;overflow:hidden;">
      <div class="chat-header" id="chatHeader">
        <button class="mob-toggle" onclick="toggleSidebar()">☰</button>
        <div class="chat-header-avatar" id="peerAvatar"></div>
        <div>
          <div class="chat-header-name" id="peerName"></div>
          <div class="chat-header-status">● Online</div>
        </div>
      </div>
      <div class="messages" id="messages"></div>
      <div class="chat-input">
        <input type="text" id="msgInput" placeholder="Nhắn tin..." onkeydown="if(event.key==='Enter')sendMsg()">
        <button class="send-btn" onclick="sendMsg()">➤</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, getDoc, getDocs, addDoc, query, orderBy, onSnapshot, serverTimestamp, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyC-diM0ASN1ClurHuz8b2lSuyK48Cop2T0",
  authDomain:"ipright-album.firebaseapp.com",
  projectId:"ipright-album",
  storageBucket:"ipright-album.firebasestorage.app",
  messagingSenderId:"920853312130",
  appId:"1:920853312130:web:3320ea05146fa7d5b03a9b"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);
const ADMIN = "duykhanhneflickr@copyright-limited.com";

let me = null;
let currentPeer = null;
let unsubMessages = null;

onAuthStateChanged(auth, async u => {
  if (!u) {
    // Show login prompt
    document.getElementById("chatLayout").innerHTML = `
      <div class="login-prompt">
        <div style="font-size:48px">💬</div>
        <h2>Chat riêng</h2>
        <p>Đăng nhập để nhắn tin với mọi người</p>
        <button class="btn-login" onclick="location.href='login.html'">🔐 Đăng nhập</button>
      </div>`;
    return;
  }

  me = u;
  document.getElementById("myName").textContent = u.displayName || u.email;

  const nr = document.getElementById("navRight");
  if(nr) nr.innerHTML = `<span style="color:var(--green);font-size:12px;font-weight:800;padding:7px 14px;background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.25);border-radius:50px;">👤 ${u.displayName||u.email}${u.email===ADMIN?' 👑':''}</span>`;

  // Update online status
  await setDoc(doc(db,"presence",u.uid), { online:true, name:u.displayName||u.email, email:u.email, uid:u.uid }, {merge:true});

  loadUsers();
});

async function loadUsers() {
  const snap = await getDocs(collection(db,"users"));
  const ul = document.getElementById("userList");
  ul.innerHTML = "";

  snap.forEach(d => {
    const u = d.data();
    if (u.email === me.email) return; // Skip self

    const div = document.createElement("div");
    div.className = "user-item";
    div.id = "user-"+d.id;
    const initial = (u.name||u.email||"?")[0].toUpperCase();
    const isAdm = u.email === ADMIN;

    div.innerHTML = `
      <div class="user-avatar">${initial}</div>
      <div class="user-info">
        <div class="user-name">${u.name||u.email} ${isAdm?'👑':''}</div>
        <div class="user-last" id="last-${d.id}">Nhấn để nhắn tin</div>
      </div>`;

    div.onclick = () => openChat(d.id, u);
    ul.appendChild(div);
  });

  if(ul.children.length === 0) {
    ul.innerHTML = `<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px;">Chưa có ai đăng ký</div>`;
  }
}

function getChatId(uid1, uid2) {
  return [uid1,uid2].sort().join("_");
}

function openChat(peerId, peerData) {
  currentPeer = { id: peerId, ...peerData };

  // UI
  document.querySelectorAll(".user-item").forEach(el => el.classList.remove("active"));
  const el = document.getElementById("user-"+peerId);
  if(el) el.classList.add("active");

  document.getElementById("noChat").style.display = "none";
  const box = document.getElementById("chatBox");
  box.style.display = "flex";
  box.style.flexDirection = "column";
  box.style.overflow = "hidden";
  box.style.flex = "1";

  const initial = (peerData.name||peerData.email||"?")[0].toUpperCase();
  document.getElementById("peerAvatar").textContent = initial;
  document.getElementById("peerName").textContent = peerData.name || peerData.email;

  // Load messages
  if (unsubMessages) unsubMessages();
  const chatId = getChatId(me.uid, peerId);
  const q = query(collection(db,"chats",chatId,"messages"), orderBy("createdAt","asc"));

  unsubMessages = onSnapshot(q, snap => {
    const msgs = document.getElementById("messages");
    msgs.innerHTML = "";
    snap.forEach(d => renderMsg(d.data()));
    msgs.scrollTop = msgs.scrollHeight;
  });

  document.getElementById("msgInput").focus();
}

function renderMsg(d) {
  const msgs = document.getElementById("messages");
  const isMe = d.uid === me.uid;
  const time = d.createdAt?.toDate
    ? d.createdAt.toDate().toLocaleTimeString("vi-VN",{hour:"2-digit",minute:"2-digit"})
    : "";

  const row = document.createElement("div");
  row.className = "msg-row" + (isMe?" me":"");
  const initial = (d.author||"?")[0].toUpperCase();

  row.innerHTML = `
    <div class="msg-avatar ${isMe?'me-av':''}">${initial}</div>
    <div>
      <div class="bubble ${isMe?'me':'them'}">${escHtml(d.text)}</div>
      <div class="bubble-time">${time}</div>
    </div>`;
  msgs.appendChild(row);
}

window.sendMsg = async () => {
  const input = document.getElementById("msgInput");
  const text = input.value.trim();
  if (!text || !currentPeer) return;
  input.value = "";

  const chatId = getChatId(me.uid, currentPeer.id);
  await addDoc(collection(db,"chats",chatId,"messages"), {
    text,
    uid: me.uid,
    author: me.displayName || me.email,
    createdAt: serverTimestamp()
  });

  // Update last message preview
  const el = document.getElementById("last-"+currentPeer.id);
  if(el) el.textContent = text.length>30 ? text.slice(0,30)+"..." : text;
};

window.toggleSidebar = () => {
  document.getElementById("sidebar").classList.toggle("open");
};

function escHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");
}
</script>
</body>
</html>
