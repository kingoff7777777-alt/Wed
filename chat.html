<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chat | iprights.asia</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--pink:#ff6eb4;--purple:#a855f7;--blue:#38bdf8;--green:#34d399;--bg:#0f0a1e;--card:#16112b;--card2:#1c1535;--border:rgba(255,255,255,0.08);--text:#f0eaff;--muted:rgba(240,234,255,0.5);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;}

/* TOPBAR */
.topbar{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:8px 10px;background:rgba(15,10,30,0.98);border-bottom:1px solid var(--border);}
.tb-logo{font-size:13px;font-weight:900;color:var(--text);text-decoration:none;margin-right:2px;}
.tb-btn{background:rgba(255,255,255,0.07);border:1px solid var(--border);color:var(--text);padding:5px 10px;border-radius:50px;font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;cursor:pointer;white-space:nowrap;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;}
.tb-btn:hover{background:rgba(255,255,255,0.12);}
.tb-btn.active{background:linear-gradient(135deg,var(--purple),var(--pink));border-color:transparent;color:#fff;}
.tb-user{font-size:11px;font-weight:800;color:var(--green);padding:5px 9px;background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.25);border-radius:50px;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tb-right{display:flex;align-items:center;gap:4px;margin-left:auto;flex-shrink:0;}
.lf-btn{background:none;border:1px solid var(--border);border-radius:50%;width:24px;height:24px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;}
.lf-btn.on{border-color:var(--purple);background:rgba(168,85,247,0.2);}

/* LAYOUT */
.main{flex:1;display:flex;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:280px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid var(--border);background:rgba(15,10,30,0.8);}
.sb-head{padding:12px 12px 8px;border-bottom:1px solid var(--border);flex-shrink:0;}
.sb-title{font-size:13px;font-weight:900;margin-bottom:8px;color:var(--text);}
.sb-tabs{display:flex;gap:6px;margin-bottom:8px;}
.sb-tab{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--muted);padding:6px;border-radius:8px;font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;cursor:pointer;text-align:center;transition:all .2s;}
.sb-tab.on{background:rgba(168,85,247,0.15);border-color:rgba(168,85,247,0.4);color:var(--purple);}
.sb-search{width:100%;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:20px;color:var(--text);padding:7px 12px;font-family:'Nunito',sans-serif;font-size:14px;outline:none;-webkit-appearance:none;}
.sb-search:focus{border-color:rgba(168,85,247,0.5);}
.sb-search::placeholder{color:var(--muted);}
.sb-list{flex:1;overflow-y:auto;padding:6px;}
.u-item{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:12px;cursor:pointer;transition:background .15s;}
.u-item:hover{background:rgba(255,255,255,0.06);}
.u-item.active{background:rgba(168,85,247,0.15);border:1px solid rgba(168,85,247,0.2);}
.u-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--pink));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;flex-shrink:0;}
.u-info{flex:1;min-width:0;}
.u-name{font-size:13px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.u-uid{font-size:10px;color:var(--purple);font-weight:700;}
.u-last{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-empty{padding:20px;text-align:center;color:var(--muted);font-size:12px;line-height:1.7;}

/* CHAT AREA */
.chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.chat-head{flex-shrink:0;padding:10px 14px;background:rgba(22,17,43,0.98);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.ch-av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--pink));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;flex-shrink:0;}
.ch-name{font-size:13px;font-weight:900;}
.ch-uid{font-size:10px;color:var(--purple);font-weight:700;}
.ch-status{font-size:10px;color:var(--green);margin-left:auto;}

/* MESSAGES */
.msgs{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px;}
.m-row{display:flex;align-items:flex-end;gap:6px;}
.m-row.me{flex-direction:row-reverse;}
.m-av{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--green));display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;flex-shrink:0;}
.m-av.me{background:linear-gradient(135deg,var(--purple),var(--pink));}
.m-bw{display:flex;flex-direction:column;max-width:72%;}
.m-row.me .m-bw{align-items:flex-end;}
.bubble{padding:9px 13px;border-radius:16px;font-size:14px;line-height:1.5;word-break:break-word;animation:msgIn .2s ease;}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.bubble.them{background:var(--card2);border-bottom-left-radius:3px;}
.bubble.me{background:linear-gradient(135deg,var(--purple),var(--pink));border-bottom-right-radius:3px;color:#fff;}
.m-time{font-size:9px;color:var(--muted);margin-top:3px;padding:0 3px;}

/* INPUT */
.input-wrap{flex-shrink:0;padding:8px 12px;background:rgba(10,6,20,0.99);border-top:1px solid var(--border);display:flex;align-items:center;gap:7px;}
.msg-inp{flex:1;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:50px;color:var(--text);padding:10px 16px;font-family:'Nunito',sans-serif;font-size:16px;outline:none;-webkit-appearance:none;transition:border-color .2s;}
.msg-inp:focus{border-color:rgba(168,85,247,0.5);}
.send-btn{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;border:none;width:40px;height:40px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 3px 12px rgba(168,85,247,0.4);}

/* NO CHAT */
.no-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);gap:12px;}
.no-chat-icon{font-size:52px;opacity:.35;}

/* EMPTY */
.empty-hint{padding:20px;text-align:center;color:var(--muted);font-size:12px;}

/* MOBILE: ẩn sidebar, hiện khi cần */
@media(max-width:600px){
  .sidebar{display:none;position:fixed;inset:0;z-index:500;width:100%;max-width:320px;}
  .sidebar.show{display:flex;}
  .chat-area .chat-head .back-mobile{display:flex !important;}
}
.back-mobile{display:none;background:rgba(255,255,255,0.07);border:1px solid var(--border);color:var(--text);width:30px;height:30px;border-radius:50%;font-size:14px;cursor:pointer;align-items:center;justify-content:center;flex-shrink:0;}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <a href="index.html" class="tb-btn">🏠</a>
  <a href="album.html" class="tb-btn">📸</a>
  <a href="watch.html" class="tb-btn">▶️</a>
  <a href="profile.html" class="tb-btn">👤</a>
  <a href="chat.html" class="tb-btn active">💬 Chat</a>
  <div class="tb-right">
    <span id="tb-user" class="tb-user" style="display:none" onclick="location.href='profile.html'"></span>
    <button class="lf-btn" onclick="setLang('vi')" id="lf-vi">🇻🇳</button>
    <button class="lf-btn" onclick="setLang('kr')" id="lf-kr">🇰🇷</button>
    <button class="lf-btn" onclick="setLang('en')" id="lf-en">🇺🇸</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sb-head">
      <div class="sb-title" id="sb-title">💬 Tin nhắn</div>
      <div class="sb-tabs">
        <button class="sb-tab on" id="tab-recent" onclick="switchTab('recent')"><span id="lbl-recent">Tin nhắn</span></button>
        <button class="sb-tab" id="tab-find" onclick="switchTab('find')"><span id="lbl-find">Tìm bạn</span></button>
      </div>
      <input class="sb-search" id="sb-search" placeholder="@username hoặc tên..." oninput="doSearch(this.value)" style="display:none">
    </div>
    <div class="sb-list" id="sb-list">
      <div class="empty-hint" id="sb-loading">Đang tải...</div>
    </div>
  </div>

  <!-- CHAT AREA -->
  <div class="chat-area" id="chatArea">
    <div class="no-chat" id="noChat">
      <div class="no-chat-icon">💬</div>
      <p id="no-chat-txt" style="font-size:14px;font-weight:700;">Chọn người để nhắn tin</p>
      <button class="tb-btn" onclick="showSidebar()" style="display:none;font-size:12px;" id="open-list-btn">☰ Mở danh sách</button>
    </div>
    <div id="chatBox" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
      <div class="chat-head">
        <button class="back-mobile" id="backBtn" onclick="hideSidebarShowList()">←</button>
        <div class="ch-av" id="peerAv"></div>
        <div>
          <div class="ch-name" id="peerName"></div>
          <div class="ch-uid" id="peerUid"></div>
        </div>
        <div class="ch-status" id="ch-status">● Online</div>
      </div>
      <div class="msgs" id="msgs"></div>
      <div class="input-wrap">
        <input class="msg-inp" id="msgInp" placeholder="Nhắn tin..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}">
        <button class="send-btn" onclick="sendMsg()">➤</button>
      </div>
    </div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, getDocs, addDoc, query,
  orderBy, onSnapshot, serverTimestamp, setDoc, limit, getDoc, where }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const fc={apiKey:"AIzaSyC-diM0ASN1ClurHuz8b2lSuyK48Cop2T0",authDomain:"ipright-album.firebaseapp.com",projectId:"ipright-album",storageBucket:"ipright-album.firebasestorage.app",messagingSenderId:"920853312130",appId:"1:920853312130:web:3320ea05146fa7d5b03a9b"};
const app=initializeApp(fc);
const auth=getAuth(app);
const db=getFirestore(app);
const ADMIN="duykhanhneflickr@copyright-limited.com";

const I18N={
  vi:{sb_title:"💬 Tin nhắn",lbl_recent:"Tin nhắn",lbl_find:"Tìm bạn",no_chat:"Chọn người để nhắn tin",online:"● Online",msg_ph:"Nhắn tin...",search_ph:"@username hoặc tên...",empty_recent:"Chưa có tin nhắn nào.\nBấm 'Tìm bạn' để bắt đầu!",empty_find:"Không tìm thấy",find_hint:"Nhập @username hoặc tên để tìm",sb_loading:"Đang tải..."},
  kr:{sb_title:"💬 메시지",lbl_recent:"메시지",lbl_find:"친구 찾기",no_chat:"대화 상대를 선택하세요",online:"● 온라인",msg_ph:"메시지 입력...",search_ph:"@사용자명 또는 이름...",empty_recent:"메시지가 없습니다.\n'친구 찾기'를 눌러보세요!",empty_find:"찾을 수 없습니다",find_hint:"@사용자명 또는 이름으로 검색",sb_loading:"로딩 중..."},
  en:{sb_title:"💬 Messages",lbl_recent:"Messages",lbl_find:"Find",no_chat:"Select someone to chat",online:"● Online",msg_ph:"Type a message...",search_ph:"@username or name...",empty_recent:"No messages yet.\nTap 'Find' to start!",empty_find:"Not found",find_hint:"Enter @username or name to search",sb_loading:"Loading..."}
};

let me=null, meData=null, peer=null, lang="vi", unsubMsgs=null;
let allUsers=[], recentPeers=[], currentTab="recent";

window.setLang=l=>{
  lang=l; localStorage.setItem("site_lang",l); localStorage.setItem("IPRIGHTS_lang",l);
  const t=I18N[l];
  document.getElementById("sb-title").textContent=t.sb_title;
  document.getElementById("lbl-recent").textContent=t.lbl_recent;
  document.getElementById("lbl-find").textContent=t.lbl_find;
  document.getElementById("no-chat-txt").textContent=t.no_chat;
  document.getElementById("ch-status").textContent=t.online;
  document.getElementById("msgInp").placeholder=t.msg_ph;
  document.getElementById("sb-search").placeholder=t.search_ph;
  ["vi","kr","en"].forEach(x=>document.getElementById("lf-"+x).classList.toggle("on",x===l));
  if(currentTab==="recent") renderRecent();
};

// Mobile: ẩn sidebar mặc định
function isMobile(){ return window.innerWidth<=600; }
window.showSidebar=()=>{ document.getElementById("sidebar").classList.add("show"); };
window.hideSidebarShowList=()=>{
  peer=null;
  document.getElementById("chatBox").style.display="none";
  document.getElementById("noChat").style.display="flex";
  document.getElementById("sidebar").classList.add("show");
};

// Hiện nút mở danh sách trên mobile
if(isMobile()){
  document.getElementById("open-list-btn").style.display="inline-flex";
  document.getElementById("sidebar").classList.add("show");
}

onAuthStateChanged(auth, async u=>{
  if(!u){ location.href="login.html"; return; }
  me=u;
  const uDoc=await getDoc(doc(db,"users",u.uid));
  if(uDoc.exists()){
    meData=uDoc.data();
  } else {
    const name=u.displayName||u.email.split("@")[0];
    meData={name,username:"",email:u.email,uid:u.uid};
    await setDoc(doc(db,"users",u.uid),meData,{merge:true});
  }
  const name=meData.name||u.displayName||u.email.split("@")[0];
  const uid=meData.username?"@"+meData.username:"";
  document.getElementById("tb-user").textContent=name+(u.email===ADMIN?" 👑":"");
  document.getElementById("tb-user").style.display="block";

  // Load users
  const snap=await getDocs(collection(db,"users"));
  allUsers=[];
  snap.forEach(d=>{ if(d.id!==me.uid) allUsers.push({id:d.id,...d.data()}); });

  setLang(localStorage.getItem("IPRIGHTS_lang")||localStorage.getItem("site_lang")||"vi");
  await loadRecent();

  // Auto open từ URL
  const params=new URLSearchParams(location.search);
  const peerId=params.get("peer");
  if(peerId){
    const f=allUsers.find(x=>x.id===peerId);
    if(f) openChat(f);
  }
});

// Load recent
async function loadRecent(){
  recentPeers=[];
  for(const u of allUsers){
    const chatId=getChatId(me.uid,u.id);
    const q=query(collection(db,"chats",chatId,"messages"),orderBy("createdAt","desc"),limit(1));
    const snap=await getDocs(q);
    if(!snap.empty){
      const d=snap.docs[0].data();
      recentPeers.push({...u,lastMsg:d.text||"",lastTime:d.createdAt?.toDate?d.createdAt.toDate():new Date(0)});
    }
  }
  recentPeers.sort((a,b)=>b.lastTime-a.lastTime);
  if(currentTab==="recent") renderRecent();
}

window.switchTab=tab=>{
  currentTab=tab;
  document.getElementById("tab-recent").classList.toggle("on",tab==="recent");
  document.getElementById("tab-find").classList.toggle("on",tab==="find");
  const search=document.getElementById("sb-search");
  if(tab==="find"){
    search.style.display="block";
    document.getElementById("sb-list").innerHTML=`<div class="empty-hint">${I18N[lang].find_hint}</div>`;
    setTimeout(()=>search.focus(),100);
  } else {
    search.style.display="none";
    renderRecent();
  }
};

function renderRecent(){
  const list=document.getElementById("sb-list");
  list.innerHTML="";
  if(!recentPeers.length){
    list.innerHTML=`<div class="empty-hint" style="white-space:pre-line">${I18N[lang].empty_recent}</div>`;
    return;
  }
  recentPeers.forEach(u=>{
    const time=u.lastTime?.getTime()>0?u.lastTime.toLocaleTimeString("vi-VN",{hour:"2-digit",minute:"2-digit"}):"";
    renderUserItem(u,u.lastMsg,time);
  });
}

window.doSearch=async q=>{
  const list=document.getElementById("sb-list");
  if(!q.trim()){list.innerHTML=`<div class="empty-hint">${I18N[lang].find_hint}</div>`;return;}
  const lq=q.toLowerCase().replace(/^@/,"");
  const filtered=allUsers.filter(u=>(u.username||"").toLowerCase().includes(lq)||(u.name||"").toLowerCase().includes(lq));
  list.innerHTML="";
  if(!filtered.length){list.innerHTML=`<div class="empty-hint">${I18N[lang].empty_find}</div>`;return;}
  filtered.forEach(u=>renderUserItem(u,"",""));
};

function renderUserItem(u,lastMsg,time){
  const list=document.getElementById("sb-list");
  const div=document.createElement("div");
  div.className="u-item"+(peer&&peer.id===u.id?" active":"");
  div.id="ui-"+u.id;
  const nm=u.name||u.email?.split("@")[0]||"?";
  div.innerHTML=`
    <div class="u-av">${nm[0].toUpperCase()}</div>
    <div class="u-info">
      <div class="u-name">${nm}${u.email===ADMIN?" 👑":""}</div>
      ${u.username?`<div class="u-uid">@${u.username}</div>`:""}
      <div class="u-last">${lastMsg||time||"Nhấn để nhắn tin"}</div>
    </div>`;
  div.onclick=()=>{
    openChat(u);
    if(isMobile()) document.getElementById("sidebar").classList.remove("show");
  };
  list.appendChild(div);
}

function getChatId(a,b){return[a,b].sort().join("_");}

function openChat(u){
  peer=u;
  const nm=u.name||u.email?.split("@")[0]||"?";
  document.getElementById("peerAv").textContent=nm[0].toUpperCase();
  document.getElementById("peerName").textContent=nm+(u.email===ADMIN?" 👑":"");
  document.getElementById("peerUid").textContent=u.username?"@"+u.username:"";
  document.getElementById("ch-status").textContent=I18N[lang].online;
  document.getElementById("noChat").style.display="none";
  const box=document.getElementById("chatBox");
  box.style.display="flex"; box.style.flexDirection="column";
  box.style.flex="1"; box.style.overflow="hidden";
  // Mark active
  document.querySelectorAll(".u-item").forEach(el=>el.classList.remove("active"));
  document.getElementById("ui-"+u.id)?.classList.add("active");

  if(unsubMsgs) unsubMsgs();
  const chatId=getChatId(me.uid,u.id);
  const q=query(collection(db,"chats",chatId,"messages"),orderBy("createdAt","asc"),limit(100));
  unsubMsgs=onSnapshot(q,snap=>{
    const msgsEl=document.getElementById("msgs");
    msgsEl.innerHTML="";
    snap.forEach(d=>renderMsg(d.data()));
    msgsEl.scrollTop=msgsEl.scrollHeight;
  });
  setTimeout(loadRecent,500);
}

function renderMsg(d){
  const isMe=d.uid===me.uid;
  const time=d.createdAt?.toDate?d.createdAt.toDate().toLocaleTimeString("vi-VN",{hour:"2-digit",minute:"2-digit"}):"";
  const nm=d.author||"?";
  const row=document.createElement("div");
  row.className="m-row"+(isMe?" me":"");
  row.innerHTML=`
    <div class="m-av ${isMe?"me":""}">${nm[0].toUpperCase()}</div>
    <div class="m-bw">
      <div class="bubble ${isMe?"me":"them"}">${esc(d.text)}</div>
      <div class="m-time">${time}</div>
    </div>`;
  document.getElementById("msgs").appendChild(row);
}

window.sendMsg=async()=>{
  const inp=document.getElementById("msgInp");
  const text=inp.value.trim();
  if(!text||!peer) return;
  inp.value="";
  const chatId=getChatId(me.uid,peer.id);
  const author=meData?.name||me.displayName||me.email.split("@")[0];
  await addDoc(collection(db,"chats",chatId,"messages"),{
    text,uid:me.uid,author,createdAt:serverTimestamp()
  });
  setTimeout(loadRecent,600);
};

function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");}
</script>
<script src="bot.js"></script>
</body>
</html>
