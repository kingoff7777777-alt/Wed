<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chat | iprights.asia</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--pink:#ff6eb4;--purple:#a855f7;--blue:#38bdf8;--green:#34d399;--bg:#0f0a1e;--card:#16112b;--card2:#1c1535;--border:rgba(255,255,255,0.08);--text:#f0eaff;--muted:rgba(240,234,255,0.5);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;}

/* TOPBAR */
.topbar{display:flex;align-items:center;gap:6px;padding:7px 10px;background:rgba(15,10,30,0.98);border-bottom:1px solid var(--border);flex-shrink:0;}
.topbar-left{display:flex;align-items:center;gap:6px;flex:1;min-width:0;}
.back-btn{background:rgba(255,255,255,0.07);border:1px solid var(--border);color:var(--text);width:30px;height:30px;border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sb-toggle{background:linear-gradient(135deg,var(--purple),var(--pink));border:none;color:#fff;width:30px;height:30px;border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.topbar-info{min-width:0;}
.topbar-title{font-size:13px;font-weight:900;}
.topbar-sub{font-size:10px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px;}
.topbar-right{display:flex;gap:3px;align-items:center;flex-shrink:0;}
.nav-a{color:var(--muted);text-decoration:none;font-size:11px;font-weight:800;padding:4px 8px;border-radius:50%;border:none;white-space:nowrap;display:flex;align-items:center;justify-content:center;width:28px;height:28px;background:rgba(255,255,255,0.05);}
.nav-a:hover{background:rgba(255,255,255,0.1);}
.nav-user-badge{font-size:10px;font-weight:800;color:var(--green);padding:3px 7px;background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.2);border-radius:50px;max-width:75px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lf-btn{background:none;border:1px solid var(--border);border-radius:50%;width:24px;height:24px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;flex-shrink:0;}
.lf-btn.on{border-color:var(--purple);background:rgba(168,85,247,0.2);}

/* MAIN LAYOUT */
.main-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}

/* SLIDE PANEL - thay sidebar thành panel trượt từ trên xuống trên mobile */
.panel{position:absolute;top:0;left:0;right:0;z-index:100;background:rgba(10,6,22,0.98);border-bottom:1px solid rgba(168,85,247,0.3);transform:translateY(-100%);transition:transform .3s cubic-bezier(.4,0,.2,1);max-height:65%;display:flex;flex-direction:column;backdrop-filter:blur(20px);}
.panel.open{transform:translateY(0);}
.panel-head{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.panel-title{font-size:12px;font-weight:900;color:var(--purple);flex:1;}
.panel-close{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:0;}
.sb-tabs{display:flex;gap:6px;margin-bottom:0;}
.sb-tab{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--muted);padding:6px;border-radius:8px;font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;cursor:pointer;text-align:center;transition:all .2s;}
.sb-tab.on{background:rgba(168,85,247,0.15);border-color:rgba(168,85,247,0.4);color:var(--purple);}
.panel-search{padding:8px 12px;border-bottom:1px solid var(--border);}
.search{width:100%;background:rgba(255,255,255,0.07);border:1px solid var(--border);border-radius:20px;color:var(--text);padding:8px 14px;font-family:'Nunito',sans-serif;font-size:16px;outline:none;-webkit-appearance:none;}
.search:focus{border-color:rgba(168,85,247,0.5);}
.search::placeholder{color:var(--muted);}
.user-list{overflow-y:auto;max-height:280px;padding:6px;}
.user-item{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:12px;cursor:pointer;transition:background .15s;}
.user-item:hover{background:rgba(255,255,255,0.06);}
.user-item.sel{background:rgba(168,85,247,0.15);border:1px solid rgba(168,85,247,0.2);}
.u-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--pink));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;flex-shrink:0;}
.u-info{min-width:0;flex:1;}
.u-name{font-size:13px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.u-uid{font-size:10px;color:var(--purple);font-weight:700;}
.u-last{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.empty-sb{padding:16px;text-align:center;color:var(--muted);font-size:12px;line-height:1.7;}

/* OVERLAY */
#overlay{display:none;position:absolute;inset:0;z-index:99;background:rgba(0,0,0,0.5);}
#overlay.show{display:block;}

/* CHAT AREA - full width */
.chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.chat-head{padding:10px 14px;background:rgba(22,17,43,0.98);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.chat-head-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--pink));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;flex-shrink:0;}
.chat-head-info{flex:1;min-width:0;}
.chat-head-name{font-size:13px;font-weight:900;}
.chat-head-uid{font-size:10px;color:var(--purple);font-weight:700;}
.chat-head-status{font-size:10px;color:var(--green);}
.msgs{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:6px;}
.msg-row{display:flex;align-items:flex-end;gap:6px;animation:msgIn .2s ease;}
@keyframes msgIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.msg-row.me{flex-direction:row-reverse;}
.m-av{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--green));display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;flex-shrink:0;}
.m-av.me{background:linear-gradient(135deg,var(--purple),var(--pink));}
.bw{display:flex;flex-direction:column;max-width:74%;}
.msg-row.me .bw{align-items:flex-end;}
.bubble{padding:8px 13px;border-radius:16px;font-size:14px;line-height:1.5;word-break:break-word;}
.bubble.them{background:var(--card2);border-bottom-left-radius:3px;}
.bubble.me{background:linear-gradient(135deg,var(--purple),var(--pink));border-bottom-right-radius:3px;}
.b-time{font-size:9px;color:var(--muted);margin-top:2px;padding:0 3px;}

/* INPUT - font 16px chống iOS zoom */
.input-area{padding:8px 12px;background:rgba(10,6,20,0.99);border-top:1px solid var(--border);flex-shrink:0;}
.emoji-picker{display:none;flex-wrap:wrap;gap:3px;padding:8px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:7px;max-height:100px;overflow-y:auto;}
.emoji-picker.show{display:flex;}
.e-item{font-size:20px;cursor:pointer;padding:3px;border-radius:5px;}
.e-item:hover{background:rgba(255,255,255,0.1);}
.input-row{display:flex;align-items:center;gap:7px;}
.emoji-btn{background:none;border:none;font-size:22px;cursor:pointer;padding:2px;flex-shrink:0;}
.msg-in{flex:1;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:50px;color:var(--text);padding:10px 16px;font-family:'Nunito',sans-serif;font-size:16px;outline:none;-webkit-appearance:none;transition:border-color .2s;}
.msg-in:focus{border-color:rgba(168,85,247,0.5);}
.send-btn{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;border:none;width:40px;height:40px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 3px 12px rgba(168,85,247,0.4);}

/* NO CHAT */
.no-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);gap:12px;padding:20px;}
.no-chat-icon{font-size:52px;opacity:.4;}

/* LOGIN WALL */
.login-wall{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:24px;text-align:center;}
.login-wall h2{font-size:22px;font-weight:900;background:linear-gradient(135deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.login-wall p{color:var(--muted);font-size:13px;}
.login-wall-btn{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;border:none;padding:12px 28px;border-radius:50px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:900;cursor:pointer;}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <button class="back-btn" onclick="history.back()">←</button>
    <button class="sb-toggle" onclick="togglePanel()" title="Danh sách chat">☰</button>
    <div class="topbar-info">
      <div class="topbar-title">💬 Chat</div>
      <div class="topbar-sub" id="topSub">iprights.asia</div>
    </div>
  </div>
  <div class="topbar-right">
    <a href="index.html" class="nav-a" title="Home">🏠</a>
    <a href="album.html" class="nav-a" title="Album">📸</a>
    <span class="nav-user-badge" id="navUser" style="display:none"></span>
    <button class="lf-btn" onclick="setLang('vi')" id="lf-vi">🇻🇳</button>
    <button class="lf-btn" onclick="setLang('kr')" id="lf-kr">🇰🇷</button>
    <button class="lf-btn" onclick="setLang('en')" id="lf-en">🇺🇸</button>
  </div>
</div>

<!-- MAIN -->
<div class="main-wrap" id="mainWrap">

  <!-- OVERLAY -->
  <div id="overlay" onclick="closePanel()"></div>

  <!-- SLIDE PANEL -->
  <div class="panel" id="panel">
    <div class="panel-head">
      <div class="sb-tabs">
        <button class="sb-tab on" id="tab-recent" onclick="switchTab('recent')">💬 <span id="tab-recent-lbl">Tin nhắn</span></button>
        <button class="sb-tab" id="tab-find" onclick="switchTab('find')">🔍 <span id="tab-find-lbl">Tìm bạn</span></button>
      </div>
      <button class="panel-close" onclick="closePanel()">✕</button>
    </div>
    <div class="panel-search" id="searchWrap" style="display:none">
      <input class="search" id="searchBox" placeholder="Nhập @username hoặc tên..." oninput="doSearch(this.value)">
    </div>
    <div class="user-list" id="userList">
      <div class="empty-sb">Đang tải...</div>
    </div>
  </div>

  <!-- CHAT AREA -->
  <div class="chat-area" id="chatArea">
    <div class="no-chat" id="noChat">
      <div class="no-chat-icon">💬</div>
      <p id="no-chat-txt" style="font-size:14px;font-weight:700;text-align:center;">Bấm ☰ để chọn người nhắn tin</p>
    </div>

    <div id="chatBox" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
      <div class="chat-head">
        <div class="chat-head-av" id="peerAv"></div>
        <div class="chat-head-info">
          <div class="chat-head-name" id="peerName"></div>
          <div class="chat-head-uid" id="peerUid"></div>
        </div>
        <div class="chat-head-status" id="online-txt">● Online</div>
      </div>
      <div class="msgs" id="msgs"></div>
      <div class="input-area">
        <div class="emoji-picker" id="emojiPicker"></div>
        <div class="input-row">
          <button class="emoji-btn" onclick="toggleEmoji()">😊</button>
          <input class="msg-in" id="msgIn" placeholder="Nhắn tin..."
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}">
          <button class="send-btn" onclick="sendMsg()">➤</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, getDocs, addDoc, query, orderBy, onSnapshot, serverTimestamp, setDoc, limit, getDoc, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const fc={apiKey:"AIzaSyC-diM0ASN1ClurHuz8b2lSuyK48Cop2T0",authDomain:"ipright-album.firebaseapp.com",projectId:"ipright-album",storageBucket:"ipright-album.firebasestorage.app",messagingSenderId:"920853312130",appId:"1:920853312130:web:3320ea05146fa7d5b03a9b"};
const app=initializeApp(fc);
const auth=getAuth(app);
const db=getFirestore(app);
const ADMIN="duykhanhneflickr@copyright-limited.com";

const EMOJIS=["😊","😂","🥰","😍","😎","🤩","😜","🥳","😢","😭","🔥","❤️","💜","💙","👍","👏","🙏","✨","🎉","💯","🌟","😤","💪","🤣","😋","🫶","🤗","😏","👀","🥹","💀","😅","🫠","🤭","😇","🥺","😱","🤯","🎶","🍜","🍕","🎮","📸"];

const I18N={
  vi:{tab_recent:"Tin nhắn",tab_find:"Tìm bạn",no_chat:"Bấm ☰ để chọn người nhắn tin",online:"● Online",send_ph:"Nhắn tin...",search_ph:"Nhập @username hoặc tên...",empty_recent:"Chưa có tin nhắn.\nBấm 'Tìm bạn' để bắt đầu!",empty_find:"Không tìm thấy người dùng",find_hint:"Nhập @username hoặc tên để tìm 🔍"},
  kr:{tab_recent:"메시지",tab_find:"친구 찾기",no_chat:"☰ 버튼을 눌러 대화 상대를 선택하세요",online:"● 온라인",send_ph:"메시지 입력...",search_ph:"@사용자명 또는 이름 입력...",empty_recent:"메시지가 없습니다.\n'친구 찾기'를 눌러보세요!",empty_find:"사용자를 찾을 수 없습니다",find_hint:"@사용자명 또는 이름으로 검색 🔍"},
  en:{tab_recent:"Messages",tab_find:"Find",no_chat:"Tap ☰ to select someone",online:"● Online",send_ph:"Type a message...",search_ph:"Enter @username or name...",empty_recent:"No messages yet.\nTap 'Find' to start!",empty_find:"No users found",find_hint:"Enter @username or name to search 🔍"}
};

let me=null, meData=null, peer=null, unsubMsgs=null, lang="vi", currentTab="recent";
let allUsers=[], recentPeers=[];

// Emoji
const picker=document.getElementById("emojiPicker");
EMOJIS.forEach(e=>{
  const s=document.createElement("span");s.className="e-item";s.textContent=e;
  s.onclick=()=>{document.getElementById("msgIn").value+=e;document.getElementById("msgIn").focus();};
  picker.appendChild(s);
});
window.toggleEmoji=()=>picker.classList.toggle("show");
document.addEventListener("click",e=>{if(!e.target.closest(".emoji-btn")&&!e.target.closest(".emoji-picker"))picker.classList.remove("show");});

// Panel toggle
window.togglePanel=()=>{
  document.getElementById("panel").classList.toggle("open");
  document.getElementById("overlay").classList.toggle("show");
};
window.closePanel=()=>{
  document.getElementById("panel").classList.remove("open");
  document.getElementById("overlay").classList.remove("show");
};

// Lang
window.setLang=l=>{
  lang=l; localStorage.setItem("site_lang",l);
  const t=I18N[l];
  document.getElementById("tab-recent-lbl").textContent=t.tab_recent;
  document.getElementById("tab-find-lbl").textContent=t.tab_find;
  document.getElementById("no-chat-txt").textContent=t.no_chat;
  document.getElementById("online-txt").textContent=t.online;
  document.getElementById("msgIn").placeholder=t.send_ph;
  document.getElementById("searchBox").placeholder=t.search_ph;
  ["vi","kr","en"].forEach(x=>document.getElementById("lf-"+x).classList.toggle("on",x===l));
  if(currentTab==="recent") renderRecent();
};

// Auth
onAuthStateChanged(auth, async u=>{
  if(!u){
    document.getElementById("mainWrap").innerHTML=`
      <div class="login-wall">
        <div style="font-size:52px">💬</div>
        <h2>Chat riêng</h2>
        <p>Đăng nhập để nhắn tin với mọi người</p>
        <button class="login-wall-btn" onclick="location.href='login.html'">🔐 Đăng nhập</button>
      </div>`;
    return;
  }
  me=u;
  // Lấy data thật từ Firestore
  const uDoc=await getDoc(doc(db,"users",u.uid));
  if(uDoc.exists()){
    meData=uDoc.data();
  } else {
    // Tạo mới nếu chưa có (tài khoản cũ)
    const fallbackName=u.displayName||u.email.split("@")[0];
    meData={name:fallbackName,username:"",email:u.email,uid:u.uid};
    await setDoc(doc(db,"users",u.uid),meData,{merge:true});
  }

  const displayName=meData.name||u.displayName||u.email.split("@")[0];
  const username=meData.username?"@"+meData.username:"";

  document.getElementById("navUser").textContent=displayName+(u.email===ADMIN?" 👑":"");
  document.getElementById("navUser").style.display="block";
  document.getElementById("topSub").textContent=displayName+(username?" ("+username+")":"");

  // Load tất cả users
  const snap=await getDocs(collection(db,"users"));
  allUsers=[];
  snap.forEach(d=>{if(d.data().uid!==me.uid) allUsers.push({id:d.id,...d.data()});});

  setLang(localStorage.getItem("site_lang")||"vi");
  await loadRecent();

  // Auto open từ URL
  const params=new URLSearchParams(location.search);
  const peerId=params.get("peer");
  if(peerId){const f=allUsers.find(x=>x.id===peerId);if(f)openChat(f);}
});

// Load recent
async function loadRecent(){
  recentPeers=[];
  for(const u of allUsers){
    const chatId=getChatId(me.uid,u.id);
    const q=query(collection(db,"chats",chatId,"messages"),orderBy("createdAt","desc"),limit(1));
    const snap=await getDocs(q);
    if(!snap.empty){
      const d=snap.docs[0].data();
      recentPeers.push({...u,lastMsg:d.text||"",lastTime:d.createdAt?.toDate?d.createdAt.toDate():new Date(0)});
    }
  }
  recentPeers.sort((a,b)=>b.lastTime-a.lastTime);
  if(currentTab==="recent") renderRecent();
}

// Tab switch
window.switchTab=tab=>{
  currentTab=tab;
  document.getElementById("tab-recent").classList.toggle("on",tab==="recent");
  document.getElementById("tab-find").classList.toggle("on",tab==="find");
  const sw=document.getElementById("searchWrap");
  if(tab==="find"){
    sw.style.display="block";
    renderFindHint();
    setTimeout(()=>document.getElementById("searchBox").focus(),100);
  } else {
    sw.style.display="none";
    renderRecent();
  }
};

function renderRecent(){
  const ul=document.getElementById("userList");ul.innerHTML="";
  if(!recentPeers.length){ul.innerHTML=`<div class="empty-sb">${(I18N[lang].empty_recent).replace(/\n/g,"<br>")}</div>`;return;}
  recentPeers.forEach(u=>{
    const time=u.lastTime?.getTime()>0?u.lastTime.toLocaleTimeString("vi-VN",{hour:"2-digit",minute:"2-digit"}):"";
    renderUserItem(u,u.lastMsg,time);
  });
}

function renderFindHint(){
  document.getElementById("userList").innerHTML=`<div class="empty-sb">${I18N[lang].find_hint}</div>`;
}

window.doSearch=async q=>{
  const ul=document.getElementById("userList");
  if(!q.trim()){renderFindHint();return;}
  const lq=q.toLowerCase().replace(/^@/,"");
  const filtered=allUsers.filter(u=>
    (u.username||"").toLowerCase().includes(lq)||
    (u.name||"").toLowerCase().includes(lq)
  );
  ul.innerHTML="";
  if(!filtered.length){ul.innerHTML=`<div class="empty-sb">${I18N[lang].empty_find}</div>`;return;}
  filtered.forEach(u=>renderUserItem(u,"",""));
};

function renderUserItem(u,lastMsg,time){
  const ul=document.getElementById("userList");
  const div=document.createElement("div");
  div.className="user-item"+(peer&&peer.id===u.id?" sel":"");
  div.id="ui-"+u.id;
  const nm=u.name||u.email?.split("@")[0]||"?";
  const uid=u.username?"@"+u.username:"";
  div.innerHTML=`
    <div class="u-av">${nm[0].toUpperCase()}</div>
    <div class="u-info">
      <div class="u-name">${nm}${u.email===ADMIN?" 👑":""}</div>
      ${uid?`<div class="u-uid">${uid}</div>`:""}
      <div class="u-last">${lastMsg||(time||"Nhấn để nhắn tin")}</div>
    </div>`;
  div.onclick=()=>{openChat(u);closePanel();};
  ul.appendChild(div);
}

function getChatId(a,b){return[a,b].sort().join("_");}

function openChat(u){
  peer=u;
  const nm=u.name||u.email?.split("@")[0]||"?";
  const uid=u.username?"@"+u.username:"";
  document.getElementById("peerAv").textContent=nm[0].toUpperCase();
  document.getElementById("peerName").textContent=nm+(u.email===ADMIN?" 👑":"");
  document.getElementById("peerUid").textContent=uid;
  document.getElementById("online-txt").textContent=I18N[lang].online;

  document.getElementById("noChat").style.display="none";
  const box=document.getElementById("chatBox");
  box.style.display="flex";box.style.flexDirection="column";
  box.style.overflow="hidden";box.style.flex="1";

  if(unsubMsgs) unsubMsgs();
  const chatId=getChatId(me.uid,u.id);
  const q=query(collection(db,"chats",chatId,"messages"),orderBy("createdAt","asc"),limit(100));
  unsubMsgs=onSnapshot(q,snap=>{
    const msgs=document.getElementById("msgs");
    msgs.innerHTML="";
    snap.forEach(d=>renderMsg(d.data()));
    msgs.scrollTop=msgs.scrollHeight;
  });

  setTimeout(loadRecent,500);
  // Fix iOS zoom: delay focus
  const inp=document.getElementById("msgIn");
  inp.blur();
  setTimeout(()=>inp.focus(),150);
}

function renderMsg(d){
  const isMe=d.uid===me.uid;
  const time=d.createdAt?.toDate?d.createdAt.toDate().toLocaleTimeString("vi-VN",{hour:"2-digit",minute:"2-digit"}):"";
  const nm=d.author||"?";
  const row=document.createElement("div");
  row.className="msg-row"+(isMe?" me":"");
  row.innerHTML=`
    <div class="m-av ${isMe?"me":""}">${nm[0].toUpperCase()}</div>
    <div class="bw">
      <div class="bubble ${isMe?"me":"them"}">${esc(d.text)}</div>
      <div class="b-time">${time}</div>
    </div>`;
  document.getElementById("msgs").appendChild(row);
}

window.sendMsg=async()=>{
  const inp=document.getElementById("msgIn");
  const text=inp.value.trim();
  if(!text||!peer)return;
  inp.value="";
  picker.classList.remove("show");

  const chatId=getChatId(me.uid,peer.id);
  // Dùng tên thật từ Firestore
  const authorName=meData?.name||me.displayName||me.email.split("@")[0];
  try{
    await addDoc(collection(db,"chats",chatId,"messages"),{
      text,uid:me.uid,author:authorName,createdAt:serverTimestamp()
    });
    await loadRecent();
  }catch(e){console.error(e);}
};

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");}
</script>
</body>
</html>
