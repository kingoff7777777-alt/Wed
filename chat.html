<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat | iprights.asia</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--pink:#ff6eb4;--purple:#a855f7;--blue:#38bdf8;--green:#34d399;--bg:#0f0a1e;--card:#16112b;--card2:#1c1535;--border:rgba(255,255,255,0.08);--text:#f0eaff;--muted:rgba(240,234,255,0.5);}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;}

/* NAV */
.topbar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(15,10,30,0.98);border-bottom:1px solid var(--border);flex-shrink:0;}
.back-btn{background:rgba(255,255,255,0.07);border:1px solid var(--border);color:var(--text);width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s;}
.back-btn:hover{background:rgba(255,255,255,0.13);}
.topbar-title{font-size:14px;font-weight:900;flex:1;}
.topbar-sub{font-size:11px;color:var(--muted);}
.nav-links{display:flex;gap:4px;margin-left:auto;}
.nav-a{color:var(--muted);text-decoration:none;font-size:11px;font-weight:800;padding:5px 10px;border-radius:50px;border:1px solid transparent;white-space:nowrap;transition:all .2s;}
.nav-a:hover{color:var(--text);background:rgba(255,255,255,0.07);}
.nav-a.active{color:#fff;background:linear-gradient(135deg,var(--purple),var(--pink));}

/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden;height:0;}

/* SIDEBAR */
.sidebar{width:200px;min-width:200px;background:rgba(12,8,24,0.98);border-right:1px solid var(--border);display:flex;flex-direction:column;}
.sb-head{padding:10px;}
.sb-me{font-size:11px;font-weight:800;color:var(--green);margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.search{width:100%;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:20px;color:var(--text);padding:6px 12px;font-family:'Nunito',sans-serif;font-size:12px;outline:none;}
.search:focus{border-color:rgba(168,85,247,0.5);}
.user-list{flex:1;overflow-y:auto;padding:6px;}
.user-item{display:flex;align-items:center;gap:8px;padding:8px 9px;border-radius:12px;cursor:pointer;transition:background .15s;}
.user-item:hover{background:rgba(255,255,255,0.05);}
.user-item.sel{background:rgba(168,85,247,0.15);border:1px solid rgba(168,85,247,0.25);}
.u-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--pink));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;flex-shrink:0;}
.u-info{min-width:0;flex:1;}
.u-name{font-size:12px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.u-last{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.no-users{padding:16px;text-align:center;color:var(--muted);font-size:11px;line-height:1.6;}

/* CHAT */
.chat-main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.chat-head{padding:10px 14px;background:rgba(22,17,43,0.98);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.chat-head-av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--pink));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;flex-shrink:0;}
.chat-head-name{font-size:13px;font-weight:900;}
.chat-head-status{font-size:10px;color:var(--green);}
.msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:6px;}
.msg-row{display:flex;align-items:flex-end;gap:6px;animation:msgIn .2s ease;}
@keyframes msgIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.msg-row.me{flex-direction:row-reverse;}
.m-av{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--green));display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;flex-shrink:0;}
.m-av.me{background:linear-gradient(135deg,var(--purple),var(--pink));}
.bubble-wrap{display:flex;flex-direction:column;max-width:70%;}
.msg-row.me .bubble-wrap{align-items:flex-end;}
.bubble{padding:8px 12px;border-radius:16px;font-size:13px;line-height:1.5;word-break:break-word;}
.bubble.them{background:var(--card2);border-bottom-left-radius:3px;}
.bubble.me{background:linear-gradient(135deg,var(--purple),var(--pink));border-bottom-right-radius:3px;}
.b-time{font-size:9px;color:var(--muted);margin-top:2px;padding:0 4px;}

/* INPUT */
.input-area{padding:8px 12px;background:rgba(12,8,24,0.98);border-top:1px solid var(--border);flex-shrink:0;}
.input-row{display:flex;align-items:center;gap:8px;}
.emoji-btn{background:none;border:none;font-size:20px;cursor:pointer;padding:4px;border-radius:8px;transition:background .15s;flex-shrink:0;}
.emoji-btn:hover{background:rgba(255,255,255,0.08);}
.msg-in{flex:1;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:50px;color:var(--text);padding:9px 16px;font-family:'Nunito',sans-serif;font-size:13px;outline:none;transition:border-color .2s;}
.msg-in:focus{border-color:rgba(168,85,247,0.5);}
.send-btn{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;border:none;width:38px;height:38px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s;box-shadow:0 3px 12px rgba(168,85,247,0.4);}
.send-btn:hover{transform:scale(1.08);}
.send-btn:active{transform:scale(0.95);}

/* EMOJI PICKER */
.emoji-picker{display:none;flex-wrap:wrap;gap:4px;padding:8px;background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:8px;max-height:120px;overflow-y:auto;}
.emoji-picker.show{display:flex;}
.e-item{font-size:20px;cursor:pointer;padding:4px;border-radius:6px;transition:background .1s;}
.e-item:hover{background:rgba(255,255,255,0.1);}

/* NO CHAT */
.no-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);gap:10px;}
.no-chat-icon{font-size:48px;opacity:.5;}

/* LOGIN WALL */
.login-wall{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:24px;text-align:center;}
.login-wall h2{font-size:20px;font-weight:900;background:linear-gradient(135deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.login-wall p{color:var(--muted);font-size:13px;}
.login-wall-btn{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;border:none;padding:11px 28px;border-radius:50px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:900;cursor:pointer;box-shadow:0 4px 16px rgba(168,85,247,0.4);}

/* MOBILE */
@media(max-width:520px){
  .sidebar{position:fixed;left:-210px;top:0;bottom:0;z-index:100;transition:left .25s;width:190px;min-width:190px;}
  .sidebar.open{left:0;}
  .mob-menu{display:flex!important;}
}
.mob-menu{display:none;background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;padding:2px 6px;}
</style>
</head>
<body>

<div class="topbar">
  <button class="mob-menu" id="mobMenu" onclick="toggleSb()">☰</button>
  <button class="back-btn" onclick="history.back()">←</button>
  <div>
    <div class="topbar-title">💬 Chat</div>
    <div class="topbar-sub" id="topSub">iprights.asia</div>
  </div>
  <div class="nav-links">
    <a href="index.html" class="nav-a">🏠</a>
    <a href="album.html" class="nav-a">📸</a>
    <span id="navUser" style="font-size:11px;font-weight:800;color:var(--green);padding:5px 8px;background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.2);border-radius:50px;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:none;"></span>
  </div>
</div>

<div class="layout" id="mainLayout">

  <div class="sidebar" id="sidebar">
    <div class="sb-head">
      <div class="sb-me" id="sbMe">Đang tải...</div>
      <input class="search" id="searchBox" placeholder="🔍 Tìm tên..." oninput="filterUsers(this.value)">
    </div>
    <div class="user-list" id="userList">
      <div class="no-users">Đang tải danh sách...</div>
    </div>
  </div>

  <div class="chat-main" id="chatMain">
    <div class="no-chat" id="noChat">
      <div class="no-chat-icon">💬</div>
      <p style="font-size:13px;font-weight:700;">Chọn người để bắt đầu nhắn tin</p>
    </div>

    <div id="chatBox" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
      <div class="chat-head">
        <div class="chat-head-av" id="peerAv"></div>
        <div>
          <div class="chat-head-name" id="peerName"></div>
          <div class="chat-head-status">● Online</div>
        </div>
      </div>
      <div class="msgs" id="msgs"></div>
      <div class="input-area">
        <div class="emoji-picker" id="emojiPicker"></div>
        <div class="input-row">
          <button class="emoji-btn" onclick="toggleEmoji()" title="Emoji">😊</button>
          <input class="msg-in" id="msgIn" placeholder="Nhắn tin..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}">
          <button class="send-btn" onclick="sendMsg()">➤</button>
        </div>
      </div>
    </div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, getDocs, addDoc, query, orderBy, onSnapshot, serverTimestamp, setDoc, limit } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const fc = {
  apiKey:"AIzaSyC-diM0ASN1ClurHuz8b2lSuyK48Cop2T0",
  authDomain:"ipright-album.firebaseapp.com",
  projectId:"ipright-album",
  storageBucket:"ipright-album.firebasestorage.app",
  messagingSenderId:"920853312130",
  appId:"1:920853312130:web:3320ea05146fa7d5b03a9b"
};

const app = initializeApp(fc);
const auth = getAuth(app);
const db = getFirestore(app);
const ADMIN = "duykhanhneflickr@copyright-limited.com";

const EMOJIS = ["😊","😂","🥰","😍","😎","🤩","😜","🥳","😢","😭","🔥","❤️","💜","💙","👍","👏","🙏","✨","🎉","💯","🌟","😤","💪","🤣","😋","🫶","🤗","😏","👀","🥹","💀","😅","🫠","🤭","😇","🥺","😱","🤯","🎶","🍜","🍕","🎮","📸"];

let me = null, peer = null, unsubMsgs = null, allUsers = [];

// Populate emoji picker
const picker = document.getElementById("emojiPicker");
EMOJIS.forEach(e => {
  const span = document.createElement("span");
  span.className = "e-item";
  span.textContent = e;
  span.onclick = () => {
    const inp = document.getElementById("msgIn");
    inp.value += e;
    inp.focus();
  };
  picker.appendChild(span);
});

window.toggleEmoji = () => picker.classList.toggle("show");
window.toggleSb = () => document.getElementById("sidebar").classList.toggle("open");

// Close emoji when clicking outside
document.addEventListener("click", e => {
  if (!e.target.closest(".emoji-btn") && !e.target.closest(".emoji-picker"))
    picker.classList.remove("show");
});

onAuthStateChanged(auth, async u => {
  if (!u) {
    document.getElementById("mainLayout").innerHTML = `
      <div class="login-wall">
        <div style="font-size:52px">💬</div>
        <h2>Chat riêng</h2>
        <p>Đăng nhập để nhắn tin<br>với mọi người</p>
        <button class="login-wall-btn" onclick="location.href='login.html'">🔐 Đăng nhập</button>
      </div>`;
    return;
  }

  me = u;
  const name = me.displayName || me.email.split("@")[0];

  // Update UI
  document.getElementById("sbMe").textContent = "👤 " + name + (me.email===ADMIN?" 👑":"");
  document.getElementById("navUser").textContent = name + (me.email===ADMIN?" 👑":"");
  document.getElementById("navUser").style.display = "block";
  document.getElementById("topSub").textContent = "Đang đăng nhập: " + name;

  // Sync user to Firestore
  await setDoc(doc(db,"users",u.uid), {
    name, email: u.email, uid: u.uid
  }, { merge: true });

  await loadUsers();

  // Auto open peer from URL param
  const params = new URLSearchParams(location.search);
  const peerId = params.get("peer");
  if (peerId) {
    const found = allUsers.find(x => x.id === peerId);
    if (found) openChat(found);
  }
});

async function loadUsers() {
  const snap = await getDocs(collection(db,"users"));
  allUsers = [];
  snap.forEach(d => {
    if (d.data().uid !== me.uid) allUsers.push({ id: d.id, ...d.data() });
  });
  renderUsers(allUsers);
}

function renderUsers(list) {
  const ul = document.getElementById("userList");
  ul.innerHTML = "";
  if (!list.length) {
    ul.innerHTML = `<div class="no-users">Chưa có người dùng nào khác.<br>Mời bạn bè đăng ký! 🌟</div>`;
    return;
  }
  list.forEach(u => {
    const div = document.createElement("div");
    div.className = "user-item" + (peer && peer.id === u.id ? " sel" : "");
    div.id = "ui-" + u.id;
    const nm = u.name || u.email?.split("@")[0] || "?";
    div.innerHTML = `
      <div class="u-av">${nm[0].toUpperCase()}</div>
      <div class="u-info">
        <div class="u-name">${nm}${u.email===ADMIN?" 👑":""}</div>
        <div class="u-sub" id="last-${u.id}">Nhấn để nhắn tin</div>
      </div>`;
    div.onclick = () => { openChat(u); if(window.innerWidth<=520) document.getElementById("sidebar").classList.remove("open"); };
    ul.appendChild(div);
  });
}

window.filterUsers = q => {
  const f = allUsers.filter(u =>
    (u.name||"").toLowerCase().includes(q.toLowerCase()) ||
    (u.email||"").toLowerCase().includes(q.toLowerCase())
  );
  renderUsers(f);
};

function getChatId(a, b) { return [a,b].sort().join("_"); }

function openChat(u) {
  peer = u;
  document.querySelectorAll(".user-item").forEach(e => e.classList.remove("sel"));
  const el = document.getElementById("ui-"+u.id);
  if (el) el.classList.add("sel");

  const nm = u.name || u.email?.split("@")[0] || "?";
  document.getElementById("peerAv").textContent = nm[0].toUpperCase();
  document.getElementById("peerName").textContent = nm + (u.email===ADMIN?" 👑":"");

  document.getElementById("noChat").style.display = "none";
  const box = document.getElementById("chatBox");
  box.style.display = "flex";
  box.style.flexDirection = "column";
  box.style.overflow = "hidden";
  box.style.flex = "1";

  if (unsubMsgs) unsubMsgs();

  const chatId = getChatId(me.uid, u.id);
  const q = query(
    collection(db,"chats",chatId,"messages"),
    orderBy("createdAt","asc"),
    limit(100)
  );

  unsubMsgs = onSnapshot(q, snap => {
    const msgs = document.getElementById("msgs");
    msgs.innerHTML = "";
    snap.forEach(d => renderMsg(d.data()));
    msgs.scrollTop = msgs.scrollHeight;
  }, err => console.error("Chat error:", err));

  document.getElementById("msgIn").focus();
}

function renderMsg(d) {
  const isMe = d.uid === me.uid;
  const time = d.createdAt?.toDate
    ? d.createdAt.toDate().toLocaleTimeString("vi-VN",{hour:"2-digit",minute:"2-digit"})
    : "";
  const nm = d.author || "?";
  const row = document.createElement("div");
  row.className = "msg-row" + (isMe ? " me" : "");
  row.innerHTML = `
    <div class="m-av ${isMe?"me":""}">${nm[0].toUpperCase()}</div>
    <div class="bubble-wrap">
      <div class="bubble ${isMe?"me":"them"}">${esc(d.text)}</div>
      <div class="b-time">${time}</div>
    </div>`;
  document.getElementById("msgs").appendChild(row);
}

window.sendMsg = async () => {
  const inp = document.getElementById("msgIn");
  const text = inp.value.trim();
  if (!text || !peer) return;
  inp.value = "";
  picker.classList.remove("show");

  const chatId = getChatId(me.uid, peer.id);
  const author = me.displayName || me.email.split("@")[0];

  try {
    await addDoc(collection(db,"chats",chatId,"messages"), {
      text, uid: me.uid, author,
      createdAt: serverTimestamp()
    });
    // Update last msg preview
    const el = document.getElementById("last-"+peer.id);
    if (el) el.textContent = text.length > 22 ? text.slice(0,22)+"..." : text;
  } catch(e) {
    console.error("Send error:", e);
    alert("Lỗi gửi tin: " + e.message);
  }
};

function esc(s) {
  return s
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/\n/g,"<br>");
}
</script>
</body>
</html>
