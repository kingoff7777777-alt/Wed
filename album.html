<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Album</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:black;
  color:white;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  min-height:100vh;
}

.container{
  width:380px;
  max-width:90%;
  padding:20px;
}

/* MENU giống trang chính */
.menu{
  position:fixed;
  top:10px;
  width:100%;
  text-align:center;
  z-index:999;
}

.menu a{
  color:white;
  text-decoration:none;
  margin:0 10px;
}

/* CARD */
.item{
  background:rgba(255,255,255,0.05);
  padding:10px;
  border-radius:15px;
  margin-bottom:15px;
}

.item img{
  width:100%;
  border-radius:10px;
}

.meta{
  font-size:13px;
  opacity:0.8;
  margin-top:5px;
}

.warn{
  font-size:12px;
  color:#ff8080;
  margin-top:5px;
}
</style>
</head>

<body>

<!-- MENU -->
<div class="menu">
  <a href="index.html">🏠 Home</a>
  <a href="album.html">📸 Album</a>
</div>

<div class="container" id="album"></div>

<script>

/* 🔥 DỮ LIỆU ẢNH (BẠN THÊM Ở ĐÂY) */
const data = [
  {
    img:"https://i.imgur.com/4AcFg90.webp",
    date:"2026-04-27",
    caption:"Ảnh vui 😂"
  },
  {
    img:"https://i.imgur.com/tV6QZ6R.jpeg",
    date:"2026-04-28",
    caption:"Đi chơi với bạn"
  }
];

/* RENDER */
function render(){
  const album = document.getElementById("album");

  data.forEach(item=>{
    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <img src="${item.img}">
      <div class="meta">📅 ${item.date}</div>
      <div class="meta">📝 ${item.caption}</div>
      <div class="warn">⚠️ Nghiêm cấm sao chép</div>
    `;

    album.appendChild(div);
  });
}

render();

</script>

</body>
</html>
