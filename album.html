<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Album | iprights.asia</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--pink:#ff6eb4;--purple:#a855f7;--blue:#38bdf8;--green:#34d399;--yellow:#fbbf24;--bg:#0f0a1e;--card:#16112b;--card2:#1c1535;--border:rgba(255,255,255,0.08);--text:#f0eaff;--muted:rgba(240,234,255,0.5);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:62px 16px 60px;overflow-x:hidden;}
body::before{content:'';position:fixed;width:500px;height:500px;border-radius:50%;background:var(--purple);filter:blur(120px);opacity:0.1;top:-200px;left:-200px;pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;width:400px;height:400px;border-radius:50%;background:var(--pink);filter:blur(100px);opacity:0.1;bottom:-150px;right:-150px;pointer-events:none;z-index:0;}
nav{position:fixed;top:0;left:0;right:0;z-index:900;display:flex;justify-content:center;align-items:center;gap:3px;padding:7px 8px;background:rgba(15,10,30,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);flex-wrap:wrap;}
.nav-a{color:var(--muted);text-decoration:none;font-size:11px;font-weight:800;padding:5px 10px;border-radius:50px;border:1px solid transparent;white-space:nowrap;transition:all .2s;}
.nav-a:hover{color:var(--text);background:rgba(255,255,255,0.07);}
.nav-a.active{color:#fff;background:linear-gradient(135deg,var(--purple),var(--pink));}
.nav-user{font-size:11px;font-weight:800;color:var(--green);padding:5px 9px;background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.25);border-radius:50px;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;}
.nav-out{font-size:11px;font-weight:700;color:var(--muted);padding:5px 9px;background:none;border:1px solid var(--border);border-radius:50px;cursor:pointer;transition:all .2s;white-space:nowrap;}
.nav-out:hover{color:var(--pink);border-color:var(--pink);}
.nav-notif{background:none;border:1px solid var(--border);color:var(--muted);padding:5px 10px;border-radius:50px;cursor:pointer;font-size:13px;position:relative;}
.nav-badge{position:absolute;top:-4px;right:-4px;background:var(--pink);color:#fff;font-size:9px;font-weight:900;width:16px;height:16px;border-radius:50%;display:none;align-items:center;justify-content:center;border:2px solid var(--bg);}
.lang-float{display:flex;gap:3px;margin-left:3px;}
.lf-btn{background:none;border:1px solid var(--border);border-radius:50%;width:25px;height:25px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;}
.lf-btn.on{border-color:var(--purple);background:rgba(168,85,247,0.2);}

/* NOTIF */
.notif-panel{position:fixed;top:52px;right:8px;z-index:800;width:290px;max-height:380px;background:var(–card);border:1px solid rgba(168,85,247,0.3);border-radius:16px;overflow-y:auto;display:none;box-shadow:0 20px 40px rgba(0,0,0,0.5);}
.notif-panel.show{display:block;}
.notif-head{padding:10px 14px;border-bottom:1px solid var(–border);font-size:12px;font-weight:800;color:var(–purple);display:flex;justify-content:space-between;align-items:center;}
.notif-clear{font-size:10px;color:var(–muted);cursor:pointer;font-weight:700;}
.notif-item{padding:10px 14px;border-bottom:1px solid var(–border);font-size:12px;line-height:1.5;cursor:pointer;transition:background .15s;}
.notif-item:hover{background:rgba(255,255,255,0.04);}
.notif-item.unread{background:rgba(168,85,247,0.06);}
.notif-time{font-size:10px;color:var(–muted);margin-top:2px;}
.notif-empty{padding:20px;text-align:center;color:var(–muted);font-size:12px;}

/* SEARCH */
.search-bar{display:flex;gap:8px;margin-bottom:12px;}
.search-inp{flex:1;background:rgba(255,255,255,0.05);border:1px solid var(–border);border-radius:50px;color:var(–text);padding:9px 16px;font-family:‘Nunito’,sans-serif;font-size:16px;outline:none;-webkit-appearance:none;transition:border-color .2s;}
.search-inp:focus{border-color:rgba(168,85,247,0.5);}
.search-clear{background:none;border:none;color:var(–muted);font-size:18px;cursor:pointer;padding:4px;display:none;}

/* WRAP */
.wrap{max-width:640px;margin:0 auto;position:relative;z-index:1;}
.hero{text-align:center;margin-bottom:14px;}
.hero h1{font-size:22px;font-weight:900;background:linear-gradient(135deg,var(–pink),var(–purple),var(–blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:3px;}
.hero p{color:var(–muted);font-size:12px;}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.count{font-size:12px;color:var(–muted);font-weight:600;}
.btn-post{background:linear-gradient(135deg,var(–purple),var(–pink));color:#fff;border:none;padding:8px 15px;border-radius:50px;font-family:‘Nunito’,sans-serif;font-size:12px;font-weight:800;cursor:pointer;box-shadow:0 4px 14px rgba(168,85,247,0.4);}

/* POST CARD */
.post-card{background:var(–card);border:1px solid var(–border);border-radius:18px;overflow:hidden;margin-bottom:14px;}
.post-card.new-card{animation:fadeUp .4s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.post-img{width:100%;max-height:400px;object-fit:cover;display:block;cursor:zoom-in;}
.post-body{padding:13px;}
.post-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
.post-author{font-size:12px;font-weight:800;color:var(–purple);background:rgba(168,85,247,0.12);border:1px solid rgba(168,85,247,0.2);padding:3px 10px;border-radius:50px;cursor:pointer;}
.post-author.admin-a{color:var(–yellow);background:rgba(251,191,36,0.12);border-color:rgba(251,191,36,0.3);}
.post-date{font-size:11px;color:var(–muted);}
.post-caption{font-size:14px;font-weight:800;margin-bottom:4px;}
.post-text{font-size:13px;color:var(–muted);line-height:1.7;white-space:pre-wrap;margin-bottom:8px;}

/* REACTIONS */
.reaction-counts{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px;min-height:4px;}
.rc-item{font-size:11px;background:rgba(255,255,255,0.06);border:1px solid var(–border);border-radius:50px;padding:2px 8px;cursor:pointer;transition:all .2s;user-select:none;}
.rc-item:hover{background:rgba(255,255,255,0.12);}
.rc-item.mine{border-color:var(–purple);background:rgba(168,85,247,0.15);}
.reaction-wrap{position:relative;display:inline-block;}
.react-btn{background:none;border:1px solid var(–border);color:var(–muted);padding:5px 11px;border-radius:50px;font-size:11px;font-family:‘Nunito’,sans-serif;font-weight:700;cursor:pointer;transition:all .2s;}
.react-btn:hover{border-color:rgba(168,85,247,0.4);}
.react-picker{position:absolute;bottom:38px;left:0;background:var(–card);border:1px solid rgba(168,85,247,0.3);border-radius:50px;padding:6px 10px;display:none;gap:5px;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,0.5);z-index:200;}
.react-picker.show{display:flex;}
.react-emoji{font-size:22px;cursor:pointer;transition:transform .15s;padding:2px;user-select:none;}
.react-emoji:hover{transform:scale(1.35);}

/* ACTIONS */
.post-actions{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.action-btn{background:none;border:1px solid var(–border);color:var(–muted);padding:5px 11px;border-radius:50px;font-size:11px;font-family:‘Nunito’,sans-serif;font-weight:700;cursor:pointer;transition:all .2s;}
.action-btn:hover{border-color:rgba(168,85,247,0.4);color:var(–purple);}
.cmt-toggle-btn.open{border-color:var(–blue);color:var(–blue);}
.post-warn{font-size:10px;color:rgba(255,100,100,0.4);font-weight:700;}

/* EDIT MODAL */
.edit-modal{display:none;position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:20px;}
.edit-modal.show{display:flex;}
.edit-box{background:var(–card);border:1px solid rgba(168,85,247,0.3);border-radius:20px;padding:24px;width:100%;max-width:480px;}
.edit-box h3{font-size:15px;font-weight:900;color:var(–purple);margin-bottom:16px;}
.edit-field{margin-bottom:12px;}
.edit-field label{display:block;font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(–purple);margin-bottom:5px;}
.edit-field input,.edit-field textarea{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(–border);border-radius:11px;color:var(–text);padding:10px 13px;font-family:‘Nunito’,sans-serif;font-size:16px;outline:none;-webkit-appearance:none;}
.edit-field input:focus,.edit-field textarea:focus{border-color:rgba(168,85,247,0.5);}
.edit-field textarea{resize:vertical;min-height:80px;}
.edit-actions{display:flex;gap:8px;margin-top:14px;}
.btn-save-edit{flex:1;background:linear-gradient(135deg,var(–purple),var(–pink));color:#fff;border:none;padding:12px;border-radius:12px;font-family:‘Nunito’,sans-serif;font-size:14px;font-weight:800;cursor:pointer;}
.btn-cancel-edit{flex:1;background:rgba(255,255,255,0.06);border:1px solid var(–border);color:var(–muted);padding:12px;border-radius:12px;font-family:‘Nunito’,sans-serif;font-size:14px;font-weight:800;cursor:pointer;}

/* COMMENTS */
.comments-section{border-top:1px solid var(–border);padding-top:10px;margin-top:6px;display:none;}
.comments-section.open{display:block;}
.cmt-list{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
.cmt-item{display:flex;gap:7px;}
.cmt-av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(–purple),var(–pink));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;flex-shrink:0;cursor:pointer;}
.cmt-right{flex:1;min-width:0;}
.cmt-bubble{background:var(–card2);border-radius:12px;border-bottom-left-radius:3px;padding:8px 11px;}
.cmt-name{font-size:11px;font-weight:800;color:var(–purple);margin-bottom:2px;cursor:pointer;}
.cmt-name:hover{text-decoration:underline;}
.cmt-name.admin-n{color:var(–yellow);}
.cmt-text{font-size:13px;line-height:1.5;word-break:break-word;}
.cmt-meta{display:flex;align-items:center;gap:10px;margin-top:4px;}
.cmt-time{font-size:10px;color:var(–muted);}
.cmt-reply-btn,.cmt-del-btn{font-size:10px;font-weight:800;background:none;border:none;cursor:pointer;font-family:‘Nunito’,sans-serif;padding:0;transition:color .2s;}
.cmt-reply-btn{color:var(–muted);}.cmt-reply-btn:hover{color:var(–purple);}
.cmt-del-btn{color:rgba(255,100,100,0.5);}.cmt-del-btn:hover{color:var(–pink);}
.replies-wrap{margin-top:6px;padding-left:10px;border-left:2px solid rgba(168,85,247,0.2);display:flex;flex-direction:column;gap:6px;}
.reply-item{display:flex;gap:6px;}
.reply-av{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(–blue),var(–green));display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;flex-shrink:0;cursor:pointer;}
.reply-bubble{background:rgba(255,255,255,0.04);border:1px solid var(–border);border-radius:10px;border-bottom-left-radius:3px;padding:6px 10px;flex:1;}
.reply-name{font-size:10px;font-weight:800;color:var(–blue);margin-bottom:1px;cursor:pointer;}
.reply-text{font-size:12px;line-height:1.5;word-break:break-word;}
.reply-meta{display:flex;gap:8px;margin-top:3px;}
.reply-time{font-size:9px;color:var(–muted);}
.reply-del{font-size:9px;color:rgba(255,100,100,0.5);background:none;border:none;cursor:pointer;font-family:‘Nunito’,sans-serif;padding:0;}
.reply-del:hover{color:var(–pink);}
.reply-input-wrap{display:none;gap:6px;align-items:center;margin-top:6px;padding-left:10px;}
.reply-input-wrap.show{display:flex;}
.reply-inp{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(168,85,247,0.3);border-radius:20px;color:var(–text);padding:6px 12px;font-family:‘Nunito’,sans-serif;font-size:16px;outline:none;-webkit-appearance:none;}
.reply-send{background:linear-gradient(135deg,var(–blue),var(–purple));color:#fff;border:none;width:28px;height:28px;border-radius:50%;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cmt-input-wrap{display:flex;gap:7px;align-items:center;}
.cmt-inp{flex:1;background:rgba(255,255,255,0.05);border:1px solid var(–border);border-radius:50px;color:var(–text);padding:8px 14px;font-family:‘Nunito’,sans-serif;font-size:16px;outline:none;-webkit-appearance:none;transition:border-color .2s;}
.cmt-inp:focus{border-color:rgba(168,85,247,0.5);}
.cmt-send{background:linear-gradient(135deg,var(–purple),var(–pink));color:#fff;border:none;width:34px;height:34px;border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cmt-login-hint{font-size:11px;color:var(–muted);text-align:center;padding:4px 0;}
.cmt-login-hint a{color:var(–purple);font-weight:700;}
.no-cmts{font-size:12px;color:var(–muted);text-align:center;padding:8px 0;}
.loading{text-align:center;padding:40px;color:var(–muted);}
.spinner{width:30px;height:30px;border:3px solid rgba(168,85,247,0.2);border-top-color:var(–purple);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px;}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:50px 20px;color:var(–muted);}
.empty-icon{font-size:42px;margin-bottom:10px;}
#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.96);z-index:9999;flex-direction:column;justify-content:center;align-items:center;padding:20px;backdrop-filter:blur(8px);cursor:zoom-out;}
#lightbox.show{display:flex;}
#lightbox img{max-width:94vw;max-height:78vh;border-radius:14px;object-fit:contain;}
#lb-close{position:fixed;top:16px;right:20px;background:rgba(255,255,255,0.1);border:none;color:#fff;font-size:18px;width:36px;height:36px;border-radius:50%;cursor:pointer;}
</style>

</head>

<nav>
  <a href="index.html" class="nav-a" id="nt-home">🏠 Home</a>
  <a href="album.html" class="nav-a active" id="nt-album">📸 Album</a>
  <a href="chat.html" class="nav-a" id="nt-chat">💬 Chat</a>
  <a href="profile.html" class="nav-a" id="nt-profile">👤 Profile</a>
  <button class="nav-notif" id="notif-btn" onclick="toggleNotif()">
    🔔<span class="nav-badge" id="notif-badge"></span>
  </button>
  <span id="navRight"></span>
  <div class="lang-float">
    <button class="lf-btn" onclick="setLang('vi')" id="lf-vi">🇻🇳</button>
    <button class="lf-btn" onclick="setLang('kr')" id="lf-kr">🇰🇷</button>
    <button class="lf-btn" onclick="setLang('en')" id="lf-en">🇺🇸</button>
  </div>
</nav>

<!-- NOTIF PANEL -->

<div class="notif-panel" id="notifPanel">
  <div class="notif-head">
    <span id="notif-title">🔔 Thông báo</span>
    <span class="notif-clear" onclick="clearNotifs()" id="notif-clear-lbl">Đọc tất cả</span>
  </div>
  <div id="notifList"><div class="notif-empty" id="notif-empty-txt">Không có thông báo</div></div>
</div>

<!-- EDIT MODAL -->

<div class="edit-modal" id="editModal" onclick="if(event.target===this)closeEdit()">
  <div class="edit-box">
    <h3 id="edit-title">✏️ Chỉnh sửa bài đăng</h3>
    <input type="hidden" id="edit-post-id">
    <div class="edit-field">
      <label id="edit-caption-lbl">Tiêu đề</label>
      <input type="text" id="edit-caption">
    </div>
    <div class="edit-field">
      <label id="edit-text-lbl">Nội dung</label>
      <textarea id="edit-text"></textarea>
    </div>
    <div class="edit-actions">
      <button class="btn-cancel-edit" onclick="closeEdit()" id="edit-cancel-lbl">Huỷ</button>
      <button class="btn-save-edit" onclick="saveEdit()" id="edit-save-lbl">💾 Lưu</button>
    </div>
  </div>
</div>

<div class="wrap">
  <div class="hero">
    <h1 id="page-title">📸 Album</h1>
    <p id="page-sub">부이뒤칸 & 문준우</p>
  </div>
  <div class="search-bar">
    <input class="search-inp" id="searchInp" placeholder="🔍 Tìm bài đăng..." oninput="doSearch(this.value)">
    <button class="search-clear" id="search-clear-btn" onclick="clearSearch()">✕</button>
  </div>
  <div class="toolbar">
    <span class="count" id="postCount"></span>
    <button class="btn-post" id="post-btn" onclick="gotoPost()">✏️ Đăng bài</button>
  </div>
  <div id="loading" class="loading"><div class="spinner"></div></div>
  <div id="empty" class="empty" style="display:none">
    <div class="empty-icon">📭</div><p id="empty-text">Chưa có bài đăng nào!</p>
  </div>
  <div id="feed"></div>
</div>

<div id="lightbox" onclick="closeLb()">
  <button id="lb-close" onclick="closeLb()">✕</button>
  <img id="lbImg" src="" alt="">
</div>

const postCache = new Map();
let searchQ="";
const openCmts={}, unsubCmts={};
const reactTimers={};

function updateNavRight(t){
  const nr=document.getElementById("navRight");
  if(me){
    const uData=usersMap[me.uid]||{};
    const name=uData.name||me.displayName||me.email.split("@")[0];
    nr.innerHTML=`<span class="nav-user" onclick="location.href='profile.html'">👤 ${esc(name)}${isAdmin?" 👑":""}</span><button class="nav-out" onclick="doLogout()">${t.nav_logout}</button>`;
  } else {
    nr.innerHTML=`<a href="login.html" class="nav-a">${t.nav_login}</a>`;
  }
}

// ── Auth ──────────────────────────────────────────────────
onAuthStateChanged(auth,async u=>{
  me=u; isAdmin=u&&u.email===ADMIN;
  if(u){
    const snap=await getDocs(collection(db,"users"));
    snap.forEach(d=>{
      usersMap[d.id]=d.data();
      if(d.data().role==="admin"&&u.uid===d.id) isAdmin=true;
    });
    listenNotifs();
  }
  setLang(localStorage.getItem(LS_LANG)||localStorage.getItem("site_lang")||"vi");
});

window.doLogout=()=>signOut(auth).then(()=>location.reload());
window.gotoPost=()=>me?location.href="post.html":location.href="login.html";

// ── SMART FEED (không xoá toàn bộ khi update) ────────────
const q=query(collection(db,"posts"),orderBy("createdAt","desc"));
onSnapshot(q, snap=>{
  document.getElementById("loading").style.display="none";

  // Tính toán thay đổi
  const newIds = [];
  const newData = new Map();
  snap.forEach(d=>{ newIds.push(d.id); newData.set(d.id,d.data()); });

  // Xoá bài không còn tồn tại
  postCache.forEach((_,id)=>{
    if(!newData.has(id)){
      const el=document.getElementById("pc-"+id);
      if(el) el.remove();
      postCache.delete(id);
    }
  });

  const feed=document.getElementById("feed");

  // Thêm hoặc cập nhật từng bài
  newIds.forEach((id,idx)=>{
    const d=newData.get(id);
    const existing=document.getElementById("pc-"+id);

    if(!existing){
      // Bài MỚI: thêm vào đúng vị trí
      const div=createPostEl(id,d,true);
      const refEl=document.getElementById("pc-"+newIds[idx+1]);
      if(refEl) feed.insertBefore(div,refEl);
      else feed.appendChild(div);
      postCache.set(id,d);
      watchCmtCount(id);
    } else {
      // Bài đã có: chỉ cập nhật phần thay đổi (KHÔNG xoá card)
      const cached=postCache.get(id)||{};
      smartUpdatePost(id, cached, d);
      postCache.set(id,d);
    }
  });

  // Update empty/count
  const t=I18N[lang];
  if(newIds.length===0){
    document.getElementById("empty").style.display="block";
    document.getElementById("empty-text").textContent=t.empty;
  } else {
    document.getElementById("empty").style.display="none";
    const visible=searchQ ? [...postCache.keys()].filter(id=>{
      const d=newData.get(id)||{};
      const lq=searchQ.toLowerCase();
      return (d.caption||"").toLowerCase().includes(lq)||(d.text||"").toLowerCase().includes(lq)||(d.author||"").toLowerCase().includes(lq);
    }).length : newIds.length;
    document.getElementById("postCount").textContent=visible+" "+t.posts;
  }
});

// Tạo element bài đăng
function createPostEl(id,d,isNew=false){
  const t=I18N[lang];
  const div=document.createElement("div");
  div.className="post-card"+(isNew?" new-card":"");
  div.id="pc-"+id;

  const isOwner=me&&me.uid===d.uid;
  const canDel=isAdmin||isOwner;
  const canEdit=isAdmin||isOwner;
  const uData=usersMap[d.uid]||{};
  const authorName=d.author||uData.name||d.authorEmail?.split("@")[0]||"?";
  const isAdminPost=d.authorEmail===ADMIN;

  div.innerHTML=buildPostHTML(id,d,authorName,isAdminPost,canDel,canEdit,t);
  return div;
}

function buildPostHTML(id,d,authorName,isAdminPost,canDel,canEdit,t){
  const reactions=d.reactions||{};
  const myReaction=me?reactions[me.uid]:null;
  const counts={};
  Object.values(reactions).forEach(e=>{counts[e]=(counts[e]||0)+1;});

  const rcHTML=Object.entries(counts).map(([e,c])=>{
    const mine=myReaction===e;
    return `<span class="rc-item${mine?" mine":""}" onclick="doReact('${id}','${e}')">${e} ${c}</span>`;
  }).join("");

  return `
    ${d.imageUrl?`<img class="post-img" src="${d.imageUrl}" onclick="openLb('${d.imageUrl}')" alt="">` :""}
    <div class="post-body">
      <div class="post-header">
        <span class="post-author ${isAdminPost?"admin-a":""}" onclick="location.href='profile.html?uid=${d.uid||""}'">
          ${isAdminPost?"👑":"👤"} ${esc(authorName)}
        </span>
        <span class="post-date">🕐 ${fmtDate(d.createdAt)}</span>
      </div>
      ${d.caption?`<div class="post-caption">${esc(d.caption)}</div>`:""}
      ${d.text?`<p class="post-text">${esc(d.text)}</p>`:""}
      <div class="reaction-counts" id="rc-${id}">${rcHTML}</div>
      <div class="post-actions">
        <div class="reaction-wrap">
          <button class="react-btn" id="rb-${id}" onclick="toggleReactPicker('${id}')" onmouseleave="scheduleCloseReact('${id}')">
            ${myReaction||t.react_lbl}
          </button>
          <div class="react-picker" id="rp-${id}" onmouseenter="cancelCloseReact('${id}')" onmouseleave="scheduleCloseReact('${id}')">
            ${REACTIONS.map(e=>`<span class="react-emoji" onclick="doReact('${id}','${e}')">${e}</span>`).join("")}
          </div>
        </div>
        <button class="action-btn cmt-toggle-btn" id="ctb-${id}" onclick="toggleCmts('${id}')">
          ${t.cmt_btn} <span id="cc-${id}"></span>
        </button>
        ${me&&d.uid&&d.uid!==me.uid?`<button class="action-btn" onclick="goChat('${d.uid||""}')">${t.msg_btn}</button>`:""}
        ${canEdit?`<button class="action-btn" onclick="openEdit('${id}')">${t.edit_btn}</button>`:""}
        ${canDel?`<button class="action-btn" onclick="delPost('${id}')">${t.del_btn}</button>`:""}
      </div>
      <div class="post-warn">${t.warn}</div>
      <div class="comments-section" id="cmts-${id}">
        <div class="cmt-list" id="cl-${id}"></div>
        ${me?`<div class="cmt-input-wrap">
          <input class="cmt-inp" id="ci-${id}" placeholder="${t.cmt_ph}" onkeydown="if(event.key==='Enter')sendCmt('${id}')">
          <button class="cmt-send" onclick="sendCmt('${id}')">➤</button>
        </div>`:`<div class="cmt-login-hint"><a href="login.html">${t.cmt_login}</a></div>`}
      </div>
    </div>`;
}

// Chỉ cập nhật phần thay đổi — KHÔNG xoá card
function smartUpdatePost(id, old, d){
  const t=I18N[lang];

  // Cập nhật reactions (phần hay thay đổi nhất)
  const oldR=JSON.stringify(old.reactions||{});
  const newR=JSON.stringify(d.reactions||{});
  if(oldR!==newR){
    const reactions=d.reactions||{};
    const myReaction=me?reactions[me.uid]:null;
    const counts={};
    Object.values(reactions).forEach(e=>{counts[e]=(counts[e]||0)+1;});

    const rcWrap=document.getElementById("rc-"+id);
    if(rcWrap){
      rcWrap.innerHTML=Object.entries(counts).map(([e,c])=>{
        const mine=myReaction===e;
        return `<span class="rc-item${mine?" mine":""}" onclick="doReact('${id}','${e}')">${e} ${c}</span>`;
      }).join("");
    }
    const rb=document.getElementById("rb-"+id);
    if(rb) rb.textContent=myReaction||t.react_lbl;
  }

  // Cập nhật caption/text nếu đã edit
  if(old.caption!==d.caption){
    const el=document.querySelector(`#pc-${id} .post-caption`);
    if(el) el.innerHTML=esc(d.caption||"");
  }
  if(old.text!==d.text){
    const el=document.querySelector(`#pc-${id} .post-text`);
    if(el) el.innerHTML=esc(d.text||"");
  }
}

// ── Search ────────────────────────────────────────────────
window.doSearch=val=>{
  searchQ=val.trim();
  const clearBtn=document.getElementById("search-clear-btn");
  clearBtn.style.display=searchQ?"block":"none";
  const lq=searchQ.toLowerCase();
  postCache.forEach((d,id)=>{
    const el=document.getElementById("pc-"+id);
    if(!el) return;
    if(!searchQ){ el.style.display=""; return; }
    const match=(d.caption||"").toLowerCase().includes(lq)||(d.text||"").toLowerCase().includes(lq)||(d.author||"").toLowerCase().includes(lq);
    el.style.display=match?"":"none";
  });
};
window.clearSearch=()=>{
  searchQ=""; document.getElementById("searchInp").value="";
  document.getElementById("search-clear-btn").style.display="none";
  postCache.forEach((_,id)=>{const el=document.getElementById("pc-"+id);if(el)el.style.display="";});
};

// ── Reactions (dùng runTransaction để atomic) ─────────────
window.toggleReactPicker=id=>{
  cancelCloseReact(id);
  document.getElementById("rp-"+id)?.classList.toggle("show");
};
window.scheduleCloseReact=id=>{ reactTimers[id]=setTimeout(()=>document.getElementById("rp-"+id)?.classList.remove("show"),400); };
window.cancelCloseReact=id=>clearTimeout(reactTimers[id]);

window.doReact=async(postId,emoji)=>{
  if(!me){ location.href="login.html"; return; }
  document.getElementById("rp-"+postId)?.classList.remove("show");

  const ref=doc(db,"posts",postId);
  let ownerUid=null;

  try{
    // runTransaction đảm bảo atomic, không conflict
    await runTransaction(db,async tx=>{
      const snap=await tx.get(ref);
      if(!snap.exists()) return;
      const data=snap.data();
      ownerUid=data.uid;
      const reactions={...(data.reactions||{})};

      if(reactions[me.uid]===emoji){
        delete reactions[me.uid]; // Toggle off
      } else {
        reactions[me.uid]=emoji; // Set/change
      }
      tx.update(ref,{reactions});
    });

    // Gửi thông báo NGOÀI transaction, có try/catch riêng
    // Không làm hỏng reaction nếu notif lỗi
    if(ownerUid && ownerUid!==me.uid){
      const myName=(usersMap[me.uid]||{}).name||me.displayName||me.email.split("@")[0];
      sendNotif(ownerUid,`${myName} đã react ${emoji} bài của bạn`,postId).catch(()=>{});
    }
  } catch(e){
    console.error("doReact error:",e);
  }
};

// ── Notifications ──────────────────────────────────────────
async function sendNotif(toUid,message,postId){
  await addDoc(collection(db,"notifications"),{toUid,message,postId,read:false,createdAt:serverTimestamp()});
}

function listenNotifs(){
  if(!me) return;
  const q=query(collection(db,"notifications"),where("toUid","==",me.uid),orderBy("createdAt","desc"),limit(20));
  onSnapshot(q,snap=>{
    const unread=snap.docs.filter(d=>!d.data().read).length;
    const badge=document.getElementById("notif-badge");
    if(unread>0){badge.textContent=unread>9?"9+":unread;badge.style.display="flex";}
    else badge.style.display="none";
    renderNotifs(snap.docs);
  });
}

function renderNotifs(docs){
  const t=I18N[lang];
  const list=document.getElementById("notifList");
  if(!docs.length){ list.innerHTML=`<div class="notif-empty">${t.notif_empty}</div>`; return; }
  list.innerHTML="";
  docs.forEach(d=>{
    const data=d.data();
    const div=document.createElement("div");
    div.className="notif-item"+(data.read?"":" unread");
    const time=data.createdAt?.toDate?data.createdAt.toDate().toLocaleString("vi-VN",{dateStyle:"short",timeStyle:"short"}):"";
    div.innerHTML=`<div>${esc(data.message)}</div><div class="notif-time">${time}</div>`;
    div.onclick=async()=>{
      await updateDoc(doc(db,"notifications",d.id),{read:true});
      if(data.postId) document.getElementById("pc-"+data.postId)?.scrollIntoView({behavior:"smooth"});
      document.getElementById("notifPanel").classList.remove("show");
    };
    list.appendChild(div);
  });
}

window.toggleNotif=()=>document.getElementById("notifPanel").classList.toggle("show");
window.clearNotifs=async()=>{
  if(!me) return;
  const q2=query(collection(db,"notifications"),where("toUid","==",me.uid),where("read","==",false));
  const snap=await getDocs(q2);
  snap.forEach(d=>updateDoc(doc(db,"notifications",d.id),{read:true}).catch(()=>{}));
};
document.addEventListener("click",e=>{
  if(!e.target.closest("#notifPanel")&&!e.target.closest("#notif-btn"))
    document.getElementById("notifPanel").classList.remove("show");
});

// ── Edit post ──────────────────────────────────────────────
window.openEdit=id=>{
  const d=postCache.get(id); if(!d) return;
  document.getElementById("edit-post-id").value=id;
  document.getElementById("edit-caption").value=d.caption||"";
  document.getElementById("edit-text").value=d.text||"";
  document.getElementById("editModal").classList.add("show");
};

window.saveEdit=async()=>{
  const id=document.getElementById("edit-post-id").value;
  const caption=document.getElementById("edit-caption").value.trim();
  const text=document.getElementById("edit-text").value.trim();
  await updateDoc(doc(db,"posts",id),{caption,text,editedAt:serverTimestamp()});
  closeEdit();

// ── Comments ───────────────────────────────────────────────
function watchCmtCount(postId){
  const q=query(collection(db,"posts",postId,"comments"),orderBy("createdAt","asc"));
  onSnapshot(q,snap=>{
    const el=document.getElementById("cc-"+postId);
    if(el) el.textContent=snap.size>0?"("+snap.size+")":"";
  });
}
window.toggleCmts=postId=>{
  const sec=document.getElementById("cmts-"+postId);
  const btn=document.getElementById("ctb-"+postId);
  if(!openCmts[postId]){
    openCmts[postId]=true; sec.classList.add("open"); btn.classList.add("open");
    loadCmts(postId);
  } else {
    openCmts[postId]=false; sec.classList.remove("open"); btn.classList.remove("open");
    if(unsubCmts[postId]){ unsubCmts[postId](); delete unsubCmts[postId]; }
  }
};
function loadCmts(postId){
  if(unsubCmts[postId]) unsubCmts[postId]();
  const q=query(collection(db,"posts",postId,"comments"),orderBy("createdAt","asc"));
  unsubCmts[postId]=onSnapshot(q,snap=>{
    const list=document.getElementById("cl-"+postId); if(!list) return;
    list.innerHTML="";
    const t=I18N[lang];
    if(snap.empty){list.innerHTML=`<div class="no-cmts">${t.no_cmts}</div>`;return;}
    snap.forEach(d=>renderCmt(postId,d.id,d.data()));
  });
}
function renderCmt(postId,cmtId,d){
  const list=document.getElementById("cl-"+postId); if(!list) return;
  const t=I18N[lang];
  const isMe=me&&me.uid===d.uid;
  const canDel=isAdmin||isMe;
  const name=d.author||"?";
  const div=document.createElement("div"); div.className="cmt-item";
  div.innerHTML=`
    <div class="cmt-av" onclick="location.href='profile.html?uid=${d.uid||""}'">
      ${d.authorEmail===ADMIN?"👑":name[0].toUpperCase()}
    </div>
    <div class="cmt-right">
      <div class="cmt-bubble">
        <div class="cmt-name ${d.authorEmail===ADMIN?"admin-n":""}" onclick="location.href='profile.html?uid=${d.uid||""}'">
          ${esc(name)}${d.authorEmail===ADMIN?" 👑":""}
        </div>
        <div class="cmt-text">${esc(d.text)}</div>
      </div>
      <div class="cmt-meta">
        <span class="cmt-time">${fmtTime(d.createdAt)}</span>
        ${me?`<button class="cmt-reply-btn" onclick="toggleReply('${cmtId}')">${t.reply_lbl}</button>`:""}
        ${canDel?`<button class="cmt-del-btn" onclick="delCmt('${postId}','${cmtId}')">${t.del_lbl}</button>`:""}
      </div>
      <div class="replies-wrap" id="rw-${cmtId}"></div>
      <div class="reply-input-wrap" id="riw-${cmtId}">
        <input class="reply-inp" id="ri-${cmtId}" placeholder="${t.reply_ph}" onkeydown="if(event.key==='Enter')sendReply('${postId}','${cmtId}')">
        <button class="reply-send" onclick="sendReply('${postId}','${cmtId}')">➤</button>
      </div>
    </div>`;
  list.appendChild(div);
  loadReplies(postId,cmtId);
}
function loadReplies(postId,cmtId){
  const q=query(collection(db,"posts",postId,"comments",cmtId,"replies"),orderBy("createdAt","asc"));
  onSnapshot(q,snap=>{
    const wrap=document.getElementById("rw-"+cmtId); if(!wrap) return;
    wrap.innerHTML="";
    const t=I18N[lang];
    snap.forEach(d=>{
      const isMe2=me&&me.uid===d.uid;
      const name=d.author||"?";
      const r=document.createElement("div"); r.className="reply-item";
      r.innerHTML=`
        <div class="reply-av" onclick="location.href='profile.html?uid=${d.uid||""}'">
          ${name[0].toUpperCase()}
        </div>
        <div class="reply-bubble">
          <div class="reply-name">${esc(name)}</div>
          <div class="reply-text">${esc(d.text)}</div>
          <div class="reply-meta">
            <span class="reply-time">${fmtTime(d.createdAt)}</span>
            ${isAdmin||isMe2?`<button class="reply-del" onclick="delReply('${postId}','${cmtId}','${d.id}')">${t.del_lbl}</button>`:""}
          </div>
        </div>`;
      wrap.appendChild(r);
    });
  });
}
window.toggleReply=cmtId=>{
  const w=document.getElementById("riw-"+cmtId);
  w.classList.toggle("show");
  if(w.classList.contains("show")) document.getElementById("ri-"+cmtId).focus();
};
window.sendReply=async(postId,cmtId)=>{
  if(!me){location.href="login.html";return;}
  const inp=document.getElementById("ri-"+cmtId);
  const text=inp.value.trim(); if(!text) return; inp.value="";
  const author=(usersMap[me.uid]||{}).name||me.displayName||me.email.split("@")[0];
  await addDoc(collection(db,"posts",postId,"comments",cmtId,"replies"),{text,author,authorEmail:me.email,uid:me.uid,createdAt:serverTimestamp()});
  document.getElementById("riw-"+cmtId).classList.remove("show");
  // Notif với catch riêng
  getDoc(doc(db,"posts",postId,"comments",cmtId)).then(s=>{
    if(s.exists()&&s.data().uid&&s.data().uid!==me.uid)
      sendNotif(s.data().uid,`${author} đã trả lời bình luận của bạn`,postId).catch(()=>{});
  }).catch(()=>{});
};
window.sendCmt=async postId=>{
  if(!me){location.href="login.html";return;}
  const inp=document.getElementById("ci-"+postId);
  const text=inp.value.trim(); if(!text) return; inp.value="";
  const author=(usersMap[me.uid]||{}).name||me.displayName||me.email.split("@")[0];
  await addDoc(collection(db,"posts",postId,"comments"),{text,author,authorEmail:me.email,uid:me.uid,createdAt:serverTimestamp()});
  // Notif
  const cached=postCache.get(postId);
  if(cached&&cached.uid&&cached.uid!==me.uid)
    sendNotif(cached.uid,`${author} đã bình luận bài của bạn`,postId).catch(()=>{});
};
window.delCmt=async(pId,cId)=>{
  if(!confirm("Xoá bình luận?")) return;
  await deleteDoc(doc(db,"posts",pId,"comments",cId));
};
window.delReply=async(pId,cId,rId)=>{
  if(!confirm("Xoá trả lời?")) return;
  await deleteDoc(doc(db,"posts",pId,"comments",cId,"replies",rId));
};
window.delPost=async id=>{
  if(!confirm("Xoá bài này?")) return;
  await deleteDoc(doc(db,"posts",id));
};
window.goChat=uid=>{location.href=`chat.html?peer=${uid}`;};
window.openLb=src=>{document.getElementById("lbImg").src=src;document.getElementById("lightbox").classList.add("show");};
window.closeLb=()=>document.getElementById("lightbox").classList.remove("show");
document.addEventListener("keydown",e=>{if(e.key==="Escape"){closeLb();closeEdit();}});
function fmtDate(ts){if(!ts?.toDate)return"";return ts.toDate().toLocaleString("vi-VN",{timeZone:"Asia/Ho_Chi_Minh",dateStyle:"medium",timeStyle:"short"});}
function fmtTime(ts){if(!ts?.toDate)return"";return ts.toDate().toLocaleTimeString("vi-VN",{hour:"2-digit",minute:"2-digit"});}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");}
</script>
