<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng bài | iprights.asia</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--pink:#ff6eb4;--purple:#a855f7;--blue:#38bdf8;--green:#34d399;--bg:#0f0a1e;--card:#16112b;--border:rgba(255,255,255,0.08);--text:#f0eaff;--muted:rgba(240,234,255,0.5);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:80px 16px 60px;overflow-x:hidden;}
body::before{content:'';position:fixed;width:500px;height:500px;border-radius:50%;background:var(--purple);filter:blur(120px);opacity:0.1;top:-200px;left:-200px;pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;width:400px;height:400px;border-radius:50%;background:var(--pink);filter:blur(100px);opacity:0.1;bottom:-150px;right:-150px;pointer-events:none;z-index:0;}
nav{position:fixed;top:0;left:0;right:0;z-index:900;display:flex;justify-content:center;gap:4px;padding:10px 16px;background:rgba(15,10,30,0.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.nav-a{color:var(--muted);text-decoration:none;font-size:12px;font-weight:800;padding:7px 16px;border-radius:50px;transition:all .25s;border:1px solid transparent;}
.nav-a:hover{color:var(--text);background:rgba(255,255,255,0.07);}
.nav-a.active{color:#fff;background:linear-gradient(135deg,var(--purple),var(--pink));box-shadow:0 4px 20px rgba(168,85,247,0.4);}
.wrap{max-width:560px;margin:0 auto;position:relative;z-index:1;}
.hero{text-align:center;margin-bottom:24px;}
.hero h1{font-size:28px;font-weight:900;background:linear-gradient(135deg,var(--pink),var(--purple),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;}
.hero p{color:var(--muted);font-size:14px;}
.card{background:var(--card);border:1px solid rgba(168,85,247,0.2);border-radius:20px;padding:28px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:11px;font-weight:800;letter-spacing:.15em;text-transform:uppercase;color:var(--purple);margin-bottom:6px;}
.field input,.field textarea{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:12px;color:var(--text);padding:12px 14px;font-family:'Nunito',sans-serif;font-size:14px;outline:none;transition:border-color .2s;}
.field input:focus,.field textarea:focus{border-color:rgba(168,85,247,0.5);}
.field textarea{resize:vertical;min-height:120px;}
.drop-zone{position:relative;border:2px dashed rgba(168,85,247,0.3);border-radius:14px;padding:28px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:14px;}
.drop-zone:hover{border-color:var(--purple);background:rgba(168,85,247,0.05);}
.drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.dz-icon{font-size:32px;margin-bottom:8px;}
.dz-text{font-size:13px;color:var(--muted);}
.dz-text span{color:var(--purple);font-weight:700;}
#previewImg{width:100%;max-height:200px;object-fit:cover;border-radius:10px;margin-bottom:14px;display:none;}
.btn{width:100%;border:none;padding:14px;border-radius:14px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;transition:all .2s;}
.btn-p{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;box-shadow:0 6px 20px rgba(168,85,247,0.4);}
.btn-p:hover{transform:translateY(-1px);}
.btn-p:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.msg{font-size:13px;font-weight:700;padding:10px 14px;border-radius:10px;margin-top:14px;text-align:center;display:none;}
.msg.ok{background:rgba(52,211,153,0.15);color:var(--green);border:1px solid rgba(52,211,153,0.3);display:block;}
.msg.err{background:rgba(255,110,180,0.15);color:var(--pink);border:1px solid rgba(255,110,180,0.3);display:block;}
.prog{height:4px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden;margin-top:12px;display:none;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--pink));width:0%;transition:width .3s;}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-a">🏠 Home</a>
  <a href="album.html" class="nav-a">📸 Album</a>
  <a href="chat.html" class="nav-a">💬 Chat</a>
  <a href="post.html" class="nav-a active">✏️ Đăng bài</a>
</nav>

<div class="wrap">
  <div class="hero">
    <h1>✏️ Đăng bài mới</h1>
    <p>Chia sẻ kỷ niệm của bạn</p>
  </div>
  <div class="card">
    <div class="field"><label>Tiêu đề / Chú thích</label><input type="text" id="caption" placeholder="Tiêu đề bài..."></div>
    <div class="field"><label>Nội dung</label><textarea id="text" placeholder="Viết gì đó... bài tập, ký ức, cảm xúc 📝"></textarea></div>
    <div class="field">
      <label>Ảnh (tùy chọn)</label>
      <img id="previewImg" alt="preview">
      <div class="drop-zone" id="dz">
        <input type="file" id="fileInput" accept="image/*" onchange="previewFile(this)">
        <div class="dz-icon">🖼️</div>
        <div class="dz-text" id="dzText">Kéo thả ảnh hoặc <span>chọn file</span></div>
      </div>
    </div>
    <button class="btn btn-p" id="submitBtn" onclick="doPost()">🚀 Đăng bài</button>
    <div class="prog" id="prog"><div class="prog-fill" id="progFill"></div></div>
    <div class="msg" id="msg"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey:"AIzaSyC-diM0ASN1ClurHuz8b2lSuyK48Cop2T0",
  authDomain:"ipright-album.firebaseapp.com",
  projectId:"ipright-album",
  storageBucket:"ipright-album.firebasestorage.app",
  messagingSenderId:"920853312130",
  appId:"1:920853312130:web:3320ea05146fa7d5b03a9b"
};

const app     = initializeApp(firebaseConfig);
const auth    = getAuth(app);
const db      = getFirestore(app);
const storage = getStorage(app);

let currentUser = null;
onAuthStateChanged(auth, u => {
  if (!u) { location.href="login.html"; return; }
  currentUser = u;
});

let selectedFile = null;

window.previewFile = (input) => {
  if(!input.files[0]) return;
  selectedFile = input.files[0];
  const r = new FileReader();
  r.onload = e => {
    document.getElementById("previewImg").src = e.target.result;
    document.getElementById("previewImg").style.display = "block";
    document.getElementById("dzText").textContent = selectedFile.name;
  };
  r.readAsDataURL(selectedFile);
};

// Drag & drop
const dz = document.getElementById("dz");
dz.addEventListener("dragover", e => { e.preventDefault(); dz.style.borderColor="var(--purple)"; });
dz.addEventListener("dragleave", () => { dz.style.borderColor=""; });
dz.addEventListener("drop", e => {
  e.preventDefault(); dz.style.borderColor="";
  const f = e.dataTransfer.files[0];
  if(f){ document.getElementById("fileInput").files = e.dataTransfer.files; previewFile(document.getElementById("fileInput")); }
});

function showMsg(type, text){ const e=document.getElementById("msg"); e.className="msg "+type; e.textContent=text; }
function setProgress(pct){ const p=document.getElementById("prog"); p.style.display="block"; document.getElementById("progFill").style.width=pct+"%"; }

window.doPost = async () => {
  const caption = document.getElementById("caption").value.trim();
  const text    = document.getElementById("text").value.trim();
  if(!caption && !text){ showMsg("err","⚠️ Nhập tiêu đề hoặc nội dung!"); return; }

  const btn = document.getElementById("submitBtn");
  btn.disabled = true; btn.textContent = "⏳ Đang đăng...";
  setProgress(20);

  try {
    let imageUrl = null;
    if (selectedFile) {
      showMsg("err",""); btn.textContent = "📤 Đang upload ảnh...";
      setProgress(40);
      const storageRef = ref(storage, `posts/${Date.now()}_${selectedFile.name}`);
      await uploadBytes(storageRef, selectedFile);
      imageUrl = await getDownloadURL(storageRef);
      setProgress(80);
    }

    await addDoc(collection(db,"posts"), {
      caption, text, imageUrl,
      author: currentUser.displayName || currentUser.email,
      authorEmail: currentUser.email,
      uid: currentUser.uid,
      likes: [],
      createdAt: serverTimestamp()
    });

    setProgress(100);
    showMsg("ok","✅ Đăng bài thành công!");
    setTimeout(() => location.href="album.html", 1200);
  } catch(e) {
    showMsg("err","❌ Lỗi: " + e.message);
    btn.disabled=false; btn.textContent="🚀 Đăng bài";
    document.getElementById("prog").style.display="none";
  }
};
</script>
</body>
</html>
