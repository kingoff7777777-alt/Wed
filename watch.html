<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Watch | iprights.asia</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--pink:#ff6eb4;--purple:#a855f7;--blue:#38bdf8;--green:#34d399;--yellow:#fbbf24;--bg:#0f0a1e;--card:#16112b;--border:rgba(255,255,255,0.08);--text:#f0eaff;--muted:rgba(240,234,255,0.5);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:62px 16px 80px;overflow-x:hidden;}
body::before{content:'';position:fixed;width:500px;height:500px;border-radius:50%;background:var(--purple);filter:blur(120px);opacity:0.1;top:-200px;left:-200px;pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;width:400px;height:400px;border-radius:50%;background:var(--pink);filter:blur(100px);opacity:0.1;bottom:-150px;right:-150px;pointer-events:none;z-index:0;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:900;display:flex;justify-content:center;align-items:center;gap:3px;padding:7px 8px;background:rgba(15,10,30,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);flex-wrap:wrap;}
.nav-a{color:var(--muted);text-decoration:none;font-size:11px;font-weight:800;padding:5px 10px;border-radius:50px;border:1px solid transparent;white-space:nowrap;transition:all .2s;}
.nav-a:hover{color:var(--text);background:rgba(255,255,255,0.07);}
.nav-a.active{color:#fff;background:linear-gradient(135deg,var(--purple),var(--pink));}
.lf-btn{background:none;border:1px solid var(--border);border-radius:50%;width:25px;height:25px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;}
.lf-btn.on{border-color:var(--purple);background:rgba(168,85,247,0.2);}

/* WRAP */
.wrap{max-width:900px;margin:0 auto;position:relative;z-index:1;}

/* HERO */
.hero{text-align:center;margin-bottom:20px;}
.hero h1{font-size:24px;font-weight:900;background:linear-gradient(135deg,var(--pink),var(--purple),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;}
.hero p{color:var(--muted);font-size:13px;}

/* SEARCH */
.search-wrap{display:flex;gap:8px;margin-bottom:20px;}
.search-inp{flex:1;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:50px;color:var(--text);padding:12px 20px;font-family:'Nunito',sans-serif;font-size:16px;outline:none;-webkit-appearance:none;transition:border-color .2s;}
.search-inp:focus{border-color:rgba(168,85,247,0.6);}
.search-btn{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;border:none;padding:12px 22px;border-radius:50px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap;box-shadow:0 4px 14px rgba(168,85,247,0.4);transition:transform .2s;}
.search-btn:hover{transform:translateY(-1px);}
.search-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}

/* PLAYER */
.player-wrap{display:none;margin-bottom:24px;background:var(--card);border:1px solid rgba(168,85,247,0.2);border-radius:18px;overflow:hidden;}
.player-wrap.show{display:block;}
.player-frame{position:relative;padding-top:56.25%;width:100%;}
.player-frame iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;}
.player-info{padding:14px 16px;}
.player-title{font-size:15px;font-weight:900;margin-bottom:4px;line-height:1.4;}
.player-channel{font-size:12px;color:var(--purple);font-weight:700;}
.player-close{float:right;background:none;border:1px solid var(--border);color:var(--muted);padding:4px 12px;border-radius:50px;font-size:11px;font-family:'Nunito',sans-serif;font-weight:700;cursor:pointer;transition:all .2s;}
.player-close:hover{border-color:var(--pink);color:var(--pink);}

/* RESULTS */
.results-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.results-count{font-size:12px;color:var(--muted);font-weight:600;}
.results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}

/* VIDEO CARD */
.video-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:all .2s;animation:fadeUp .4s ease both;}
.video-card:hover{transform:translateY(-4px);border-color:rgba(168,85,247,0.4);box-shadow:0 8px 24px rgba(0,0,0,0.4);}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.thumb-wrap{position:relative;padding-top:56.25%;overflow:hidden;background:#000;}
.thumb-wrap img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;transition:transform .3s;}
.video-card:hover .thumb-wrap img{transform:scale(1.05);}
.play-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0);transition:background .2s;}
.video-card:hover .play-overlay{background:rgba(0,0,0,0.3);}
.play-icon{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.9);display:flex;align-items:center;justify-content:center;font-size:18px;opacity:0;transform:scale(0.8);transition:all .2s;}
.video-card:hover .play-icon{opacity:1;transform:scale(1);}
.video-info{padding:12px;}
.video-title{font-size:13px;font-weight:800;line-height:1.4;margin-bottom:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.video-channel{font-size:11px;color:var(--purple);font-weight:700;margin-bottom:3px;}
.video-meta{font-size:10px;color:var(--muted);}

/* LOADING */
.loading{text-align:center;padding:40px;color:var(--muted);}
.spinner{width:32px;height:32px;border:3px solid rgba(168,85,247,0.2);border-top-color:var(--purple);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg)}}

/* EMPTY */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:.5;}
.empty-text{font-size:14px;font-weight:600;}

/* ERROR */
.error-box{background:rgba(255,110,180,0.1);border:1px solid rgba(255,110,180,0.3);border-radius:14px;padding:16px;margin-bottom:16px;font-size:13px;color:var(--pink);display:none;}
.error-box.show{display:block;}

/* API KEY WARNING */
.api-warning{background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.3);border-radius:14px;padding:14px 16px;margin-bottom:20px;font-size:12px;color:var(--yellow);display:none;}
.api-warning.show{display:block;}
</style>

</head>
<body>

<nav>
  <a href="index.html" class="nav-a" id="nt-home">🏠 Home</a>
  <a href="album.html" class="nav-a" id="nt-album">📸 Album</a>
  <a href="chat.html" class="nav-a" id="nt-chat">💬 Chat</a>
  <a href="watch.html" class="nav-a active" id="nt-watch">▶️ Watch</a>
  <a href="profile.html" class="nav-a" id="nt-profile">👤 Profile</a>
  <button class="lf-btn" onclick="setLang('vi')" id="lf-vi">🇻🇳</button>
  <button class="lf-btn" onclick="setLang('kr')" id="lf-kr">🇰🇷</button>
  <button class="lf-btn" onclick="setLang('en')" id="lf-en">🇺🇸</button>
</nav>

<div class="wrap">
  <div class="hero">
    <h1 id="page-title">▶️ Watch</h1>
    <p id="page-sub">Tìm kiếm và xem video YouTube</p>
  </div>

  <div class="api-warning" id="apiWarning">
    ⚠️ Chưa có YouTube API Key! Thêm key vào biến <strong>YT_API_KEY</strong> trong file này.
    Lấy key tại: <a href="https://console.cloud.google.com/apis/credentials" target="_blank" style="color:var(--yellow);">Google Cloud Console</a>
  </div>

  <div class="search-wrap">
    <input class="search-inp" id="searchInp" placeholder="🔍 Tìm kiếm video..." onkeydown="if(event.key==='Enter')doSearch()">
    <button class="search-btn" id="searchBtn" onclick="doSearch()">🔍 <span id="search-lbl">Tìm</span></button>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div class="player-wrap" id="playerWrap">
    <div class="player-frame">
      <iframe id="playerFrame" allowfullscreen allow="autoplay; encrypted-media"></iframe>
    </div>
    <div class="player-info">
      <button class="player-close" onclick="closePlayer()" id="close-lbl">✕ Đóng</button>
      <div class="player-title" id="playerTitle"></div>
      <div class="player-channel" id="playerChannel"></div>
    </div>
  </div>

  <div class="results-head" id="resultsHead" style="display:none;">
    <span class="results-count" id="resultsCount"></span>
  </div>
  <div id="loading" class="loading" style="display:none;"><div class="spinner"></div></div>
  <div id="emptyState" class="empty-state" style="display:none;">
    <div class="empty-icon">🎬</div>
    <p class="empty-text" id="empty-text">Tìm video bạn muốn xem!</p>
  </div>
  <div class="results-grid" id="resultsGrid"></div>

  <div style="text-align:center;margin-top:20px;">
    <button id="loadMoreBtn" onclick="loadMore()" style="display:none;background:rgba(255,255,255,0.06);border:1px solid var(--border);color:var(--muted);padding:10px 28px;border-radius:50px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:all .2s;">
      <span id="load-more-lbl">Xem thêm</span>
    </button>
  </div>
</div>

<script>
// ⚠️ THAY API KEY CỦA BẠN VÀO ĐÂY
var YT_API_KEY = "AIzaSyDhcDJQi0dnmeSfM9kHVQjPeAKAbLkKuLw";
var YT_SEARCH  = "https://www.googleapis.com/youtube/v3/search";

var lang = localStorage.getItem("IPRIGHTS_lang") || localStorage.getItem("site_lang") || "vi";
var currentQ = "";
var nextPageToken = "";
var isLoading = false;

var I18N = {
  vi:{nav_home:"🏠 Home",nav_album:"📸 Album",nav_chat:"💬 Chat",nav_watch:"▶️ Watch",nav_profile:"👤 Profile",page_title:"▶️ Watch",page_sub:"Tìm kiếm và xem video YouTube",search_ph:"🔍 Tìm kiếm video...",search_lbl:"Tìm",results:"kết quả",load_more:"Xem thêm",close:"✕ Đóng",empty:"Tìm video bạn muốn xem!",no_results:"Không tìm thấy video nào",err_key:"Chưa có API Key! Vào Google Cloud Console để lấy.",err_quota:"Hết quota API hôm nay, thử lại ngày mai!",err_net:"Lỗi kết nối, kiểm tra mạng và thử lại!"},
  kr:{nav_home:"🏠 홈",nav_album:"📸 앨범",nav_chat:"💬 채팅",nav_watch:"▶️ 시청",nav_profile:"👤 프로필",page_title:"▶️ 시청",page_sub:"YouTube 동영상 검색 및 시청",search_ph:"🔍 동영상 검색...",search_lbl:"검색",results:"결과",load_more:"더 보기",close:"✕ 닫기",empty:"보고 싶은 동영상을 검색하세요!",no_results:"동영상을 찾을 수 없습니다",err_key:"API 키가 없습니다!",err_quota:"오늘 API 할당량 초과, 내일 다시 시도하세요!",err_net:"연결 오류!"},
  en:{nav_home:"🏠 Home",nav_album:"📸 Album",nav_chat:"💬 Chat",nav_watch:"▶️ Watch",nav_profile:"👤 Profile",page_title:"▶️ Watch",page_sub:"Search and watch YouTube videos",search_ph:"🔍 Search videos...",search_lbl:"Search",results:"results",load_more:"Load more",close:"✕ Close",empty:"Search for videos you want to watch!",no_results:"No videos found",err_key:"No API Key! Get one from Google Cloud Console.",err_quota:"API quota exceeded for today, try again tomorrow!",err_net:"Connection error, check your network!"}
};

function setLang(l) {
  lang = l;
  localStorage.setItem("IPRIGHTS_lang", l);
  localStorage.setItem("site_lang", l);
  var t = I18N[l];
  document.getElementById("nt-home").textContent = t.nav_home;
  document.getElementById("nt-album").textContent = t.nav_album;
  document.getElementById("nt-chat").textContent = t.nav_chat;
  document.getElementById("nt-watch").textContent = t.nav_watch;
  document.getElementById("nt-profile").textContent = t.nav_profile;
  document.getElementById("page-title").textContent = t.page_title;
  document.getElementById("page-sub").textContent = t.page_sub;
  document.getElementById("searchInp").placeholder = t.search_ph;
  document.getElementById("search-lbl").textContent = t.search_lbl;
  document.getElementById("close-lbl").textContent = t.close;
  document.getElementById("empty-text").textContent = t.empty;
  document.getElementById("load-more-lbl").textContent = t.load_more;
  ["vi","kr","en"].forEach(function(x) {
    document.getElementById("lf-"+x).classList.toggle("on", x === l);
  });
}

// Check API key
window.onload = function() {
  setLang(lang);
  if (!YT_API_KEY || YT_API_KEY === "YOUR_YOUTUBE_API_KEY_HERE") {
    document.getElementById("apiWarning").classList.add("show");
  }
  // Show initial empty state
  document.getElementById("emptyState").style.display = "block";
};

function doSearch() {
  var q = document.getElementById("searchInp").value.trim();
  if (!q) return;
  if (!YT_API_KEY || YT_API_KEY === "YOUR_YOUTUBE_API_KEY_HERE") {
    showError(I18N[lang].err_key);
    return;
  }
  currentQ = q;
  nextPageToken = "";
  document.getElementById("resultsGrid").innerHTML = "";
  document.getElementById("loadMoreBtn").style.display = "none";
  document.getElementById("resultsHead").style.display = "none";
  document.getElementById("emptyState").style.display = "none";
  fetchVideos();
}

function loadMore() {
  if (!nextPageToken || isLoading) return;
  fetchVideos();
}

function fetchVideos() {
  if (isLoading) return;
  isLoading = true;

  var btn = document.getElementById("searchBtn");
  btn.disabled = true;
  document.getElementById("loading").style.display = "block";
  document.getElementById("errorBox").classList.remove("show");

  var url = YT_SEARCH + "?part=snippet&type=video&maxResults=12&q=" +
    encodeURIComponent(currentQ) + "&key=" + YT_API_KEY;
  if (nextPageToken) url += "&pageToken=" + nextPageToken;

  fetch(url)
    .then(function(r) {
      if (r.status === 403) throw new Error("quota");
      if (!r.ok) throw new Error("net");
      return r.json();
    })
    .then(function(data) {
      document.getElementById("loading").style.display = "none";
      btn.disabled = false;
      isLoading = false;

      if (!data.items || data.items.length === 0) {
        document.getElementById("emptyState").style.display = "block";
        document.getElementById("empty-text").textContent = I18N[lang].no_results;
        return;
      }

      nextPageToken = data.nextPageToken || "";

      // Total results
      var total = data.pageInfo && data.pageInfo.totalResults
        ? data.pageInfo.totalResults.toLocaleString() : "";
      document.getElementById("resultsHead").style.display = "flex";
      document.getElementById("resultsCount").textContent =
        total ? total + " " + I18N[lang].results : "";

      renderResults(data.items);

      document.getElementById("loadMoreBtn").style.display =
        nextPageToken ? "inline-block" : "none";
    })
    .catch(function(e) {
      document.getElementById("loading").style.display = "none";
      btn.disabled = false;
      isLoading = false;
      var msg = e.message === "quota" ? I18N[lang].err_quota : I18N[lang].err_net;
      showError(msg);
    });
}

function renderResults(items) {
  var grid = document.getElementById("resultsGrid");
  items.forEach(function(item, i) {
    if (!item.id || !item.id.videoId) return;
    var vid = item.id.videoId;
    var snippet = item.snippet;
    var thumb = snippet.thumbnails &&
      (snippet.thumbnails.medium || snippet.thumbnails.default);
    var thumbUrl = thumb ? thumb.url : "";
    var title = snippet.title || "";
    var channel = snippet.channelTitle || "";
    var date = snippet.publishedAt
      ? new Date(snippet.publishedAt).toLocaleDateString("vi-VN")
      : "";

    var card = document.createElement("div");
    card.className = "video-card";
    card.style.animationDelay = (i % 12 * 0.05) + "s";
    card.innerHTML =
      '<div class="thumb-wrap">' +
        '<img src="' + thumbUrl + '" alt="" loading="lazy">' +
        '<div class="play-overlay"><div class="play-icon">▶</div></div>' +
      '</div>' +
      '<div class="video-info">' +
        '<div class="video-title">' + escHtml(title) + '</div>' +
        '<div class="video-channel">📺 ' + escHtml(channel) + '</div>' +
        '<div class="video-meta">📅 ' + date + '</div>' +
      '</div>';

    card.onclick = function() { playVideo(vid, title, channel); };
    grid.appendChild(card);
  });
}

// FIX CHỐT: DÙNG INVIDIOUS PROXY NADEKO ĐÃ TEST CHẠY NGON Ở TRƯỜNG
function playVideo(videoId, title, channel) {
  // Gọi video qua embed của server nadeko mà trường không chặn
  document.getElementById("playerFrame").src =
    "https://inv.nadeko.net/embed/" + videoId + "?autoplay=1";
  document.getElementById("playerTitle").textContent = title;
  document.getElementById("playerChannel").textContent = "📺 " + channel;
  document.getElementById("playerWrap").classList.add("show");
  document.getElementById("playerWrap").scrollIntoView({behavior:"smooth"});
}

function closePlayer() {
  document.getElementById("playerFrame").src = "";
  document.getElementById("playerWrap").classList.remove("show");
}

function showError(msg) {
  var box = document.getElementById("errorBox");
  box.textContent = "❌ " + msg;
  box.classList.add("show");
}

function escHtml(s) {
  return (s||"").replace(/&/g,"&").replace(/</g,"<").replace(/>/g,">");
}

// Search on Enter
document.getElementById("searchInp").addEventListener("keydown", function(e) {
  if (e.key === "Enter") doSearch();
});
</script>

<script src="Bot.js" defer></script>

</body>
</html>
