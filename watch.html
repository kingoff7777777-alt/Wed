<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Watch | iprights.asia</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--pink:#ff6eb4;--purple:#a855f7;--blue:#38bdf8;--green:#34d399;--yellow:#fbbf24;--bg:#0f0a1e;--card:#16112b;--border:rgba(255,255,255,0.08);--text:#f0eaff;--muted:rgba(240,234,255,0.5);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:62px 16px 80px;overflow-x:hidden;}
body::before{content:'';position:fixed;width:500px;height:500px;border-radius:50%;background:var(--purple);filter:blur(120px);opacity:0.1;top:-200px;left:-200px;pointer-events:none;z-index:0;}
nav{position:fixed;top:0;left:0;right:0;z-index:900;display:flex;justify-content:center;align-items:center;gap:3px;padding:7px 8px;background:rgba(15,10,30,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);flex-wrap:wrap;}
.nav-a{color:var(--muted);text-decoration:none;font-size:11px;font-weight:800;padding:5px 10px;border-radius:50px;border:1px solid transparent;white-space:nowrap;transition:all .2s;}
.nav-a:hover{color:var(--text);background:rgba(255,255,255,0.07);}
.nav-a.active{color:#fff;background:linear-gradient(135deg,var(--purple),var(--pink));}
.lf-btn{background:none;border:1px solid var(--border);border-radius:50%;width:25px;height:25px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;}
.lf-btn.on{border-color:var(--purple);background:rgba(168,85,247,0.2);}
.wrap{max-width:900px;margin:0 auto;position:relative;z-index:1;}
.hero{text-align:center;margin-bottom:16px;}
.hero h1{font-size:24px;font-weight:900;background:linear-gradient(135deg,var(--pink),var(--purple),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;}
.hero p{color:var(--muted);font-size:13px;}

/* SOURCE TABS */
.source-tabs{display:flex;gap:8px;margin-bottom:14px;justify-content:center;}
.src-tab{flex:1;max-width:180px;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--muted);padding:10px 8px;border-radius:14px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer;text-align:center;transition:all .2s;}
.src-tab.on{color:#fff;border-color:transparent;}
.src-tab.dm.on{background:linear-gradient(135deg,#0066dc,#003d8f);box-shadow:0 4px 14px rgba(0,102,220,0.4);}
.src-tab.piped.on{background:linear-gradient(135deg,#f00,#a00);box-shadow:0 4px 14px rgba(220,0,0,0.4);}

/* SEARCH */
.search-wrap{display:flex;gap:8px;margin-bottom:16px;}
.search-inp{flex:1;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:50px;color:var(--text);padding:12px 20px;font-family:'Nunito',sans-serif;font-size:16px;outline:none;-webkit-appearance:none;}
.search-inp:focus{border-color:rgba(168,85,247,0.6);}
.search-btn{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;border:none;padding:12px 22px;border-radius:50px;font-family:'Nunito',sans-serif;font-weight:800;cursor:pointer;box-shadow:0 4px 14px rgba(168,85,247,0.4);}
.search-btn:disabled{opacity:.6;cursor:not-allowed;}

/* PLAYER */
.player-wrap{display:none;margin-bottom:20px;background:var(--card);border:1px solid rgba(168,85,247,0.25);border-radius:18px;overflow:hidden;}
.player-wrap.show{display:block;}
.player-frame{position:relative;padding-top:56.25%;background:#000;}
.player-frame iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;}
.player-bottom{padding:12px 14px;}
.player-title{font-size:14px;font-weight:900;margin-bottom:3px;line-height:1.4;}
.player-channel{font-size:11px;color:var(--purple);font-weight:700;margin-bottom:10px;}
.player-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.p-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:50px;font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;cursor:pointer;transition:all .2s;}
.p-btn:hover{background:rgba(255,255,255,0.07);}
.src-badge{font-size:10px;font-weight:800;padding:3px 10px;border-radius:50px;}
.src-badge.dm{background:rgba(0,102,220,0.2);color:#4d9fff;border:1px solid rgba(0,102,220,0.3);}
.src-badge.piped{background:rgba(220,0,0,0.15);color:#ff6666;border:1px solid rgba(220,0,0,0.25);}

/* RESULTS */
.results-head{display:flex;align-items:center;margin-bottom:12px;}
.results-count{font-size:12px;color:var(--muted);font-weight:600;}
.results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px;}
.video-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:all .2s;animation:fadeUp .3s ease both;}
.video-card:hover{transform:translateY(-4px);border-color:rgba(168,85,247,0.4);box-shadow:0 8px 24px rgba(0,0,0,0.4);}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.thumb-wrap{position:relative;padding-top:56.25%;background:#111;overflow:hidden;}
.thumb-wrap img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;transition:transform .3s;}
.video-card:hover .thumb-wrap img{transform:scale(1.05);}
.play-ov{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0);transition:background .2s;}
.video-card:hover .play-ov{background:rgba(0,0,0,0.35);}
.play-ic{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.9);display:flex;align-items:center;justify-content:center;font-size:18px;opacity:0;transform:scale(.8);transition:all .2s;}
.video-card:hover .play-ic{opacity:1;transform:scale(1);}
.card-source{position:absolute;top:6px;left:6px;font-size:9px;font-weight:900;padding:2px 7px;border-radius:50px;}
.card-source.dm{background:#0066dc;color:#fff;}
.card-source.piped{background:#cc0000;color:#fff;}
.video-info{padding:12px;}
.video-title{font-size:13px;font-weight:800;line-height:1.4;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.video-channel{font-size:11px;color:var(--purple);font-weight:700;margin-bottom:2px;}
.video-meta{font-size:10px;color:var(--muted);}

.loading{text-align:center;padding:40px;color:var(--muted);}
.spinner{width:32px;height:32px;border:3px solid rgba(168,85,247,0.2);border-top-color:var(--purple);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px;}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:50px 20px;color:var(--muted);font-size:14px;font-weight:600;}
.error-box{background:rgba(255,110,180,0.1);border:1px solid rgba(255,110,180,0.3);border-radius:12px;padding:14px;margin-bottom:14px;font-size:13px;color:var(--pink);display:none;}
.error-box.show{display:block;}
.load-more-btn{background:rgba(255,255,255,0.06);border:1px solid var(--border);color:var(--muted);padding:10px 28px;border-radius:50px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;display:none;margin-top:20px;}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-a" id="nt-home">🏠 Home</a>
  <a href="album.html" class="nav-a" id="nt-album">📸 Album</a>
  <a href="chat.html" class="nav-a" id="nt-chat">💬 Chat</a>
  <a href="watch.html" class="nav-a active" id="nt-watch">▶️ Watch</a>
  <a href="profile.html" class="nav-a" id="nt-profile">👤 Profile</a>
  <button class="lf-btn" onclick="setLang('vi')" id="lf-vi">🇻🇳</button>
  <button class="lf-btn" onclick="setLang('kr')" id="lf-kr">🇰🇷</button>
  <button class="lf-btn" onclick="setLang('en')" id="lf-en">🇺🇸</button>
</nav>

<div class="wrap">
  <div class="hero">
    <h1 id="page-title">▶️ Watch</h1>
    <p id="page-sub">Tìm kiếm và xem video</p>
  </div>

  <!-- SOURCE TABS -->
  <div class="source-tabs">
    <button class="src-tab dm on" id="tab-dm" onclick="switchSource('dm')">
      🔵 Dailymotion
    </button>
    <button class="src-tab piped" id="tab-piped" onclick="switchSource('piped')">
      🔴 Piped (YouTube)
    </button>
  </div>

  <div class="search-wrap">
    <input class="search-inp" id="searchInp" placeholder="🔍 Tìm kiếm video...">
    <button class="search-btn" id="searchBtn" onclick="doSearch()">🔍 <span id="search-lbl">Tìm</span></button>
  </div>

  <div class="error-box" id="errorBox"></div>

  <!-- PLAYER -->
  <div class="player-wrap" id="playerWrap">
    <div class="player-frame">
      <iframe id="playerIframe" allowfullscreen allow="autoplay; encrypted-media; picture-in-picture"></iframe>
    </div>
    <div class="player-bottom">
      <div class="player-title" id="playerTitle"></div>
      <div class="player-channel" id="playerChannel"></div>
      <div class="player-actions">
        <button class="p-btn" onclick="closePlayer()" id="close-lbl">✕ Đóng</button>
        <span class="src-badge" id="playerBadge">DM</span>
      </div>
    </div>
  </div>

  <div id="resultsHead" class="results-head" style="display:none;">
    <span class="results-count" id="resultsCount"></span>
  </div>
  <div id="loading" class="loading" style="display:none;"><div class="spinner"></div></div>
  <div id="emptyState" class="empty">🎬 Tìm video bạn muốn xem!</div>
  <div class="results-grid" id="resultsGrid"></div>
  <div style="text-align:center;">
    <button class="load-more-btn" id="loadMoreBtn" onclick="loadMore()">
      <span id="load-more-lbl">Xem thêm</span>
    </button>
  </div>
</div>

<script>
// APIs - KHÔNG cần key!
var DM_API    = "https://api.dailymotion.com/videos";
var PIPED_API = "https://pipedapi.kavin.rocks/search";

var currentSource = "dm"; // "dm" hoặc "piped"
var lang = localStorage.getItem("IPRIGHTS_lang") || localStorage.getItem("site_lang") || "vi";
var currentQ = "", nextPage = 1, nextPipedToken = "", isLoading = false;

var I18N = {
  vi:{nav_home:"🏠 Home",nav_album:"📸 Album",nav_chat:"💬 Chat",nav_watch:"▶️ Watch",nav_profile:"👤 Profile",page_title:"▶️ Watch",page_sub:"Tìm kiếm và xem video",search_ph:"🔍 Tìm kiếm video...",search_lbl:"Tìm",results:"kết quả",load_more:"Xem thêm",close:"✕ Đóng",empty:"🎬 Tìm video bạn muốn xem!",no_results:"Không tìm thấy video nào"},
  kr:{nav_home:"🏠 홈",nav_album:"📸 앨범",nav_chat:"💬 채팅",nav_watch:"▶️ 시청",nav_profile:"👤 프로필",page_title:"▶️ 시청",page_sub:"동영상 검색 및 시청",search_ph:"🔍 동영상 검색...",search_lbl:"검색",results:"결과",load_more:"더 보기",close:"✕ 닫기",empty:"🎬 보고 싶은 동영상을 검색하세요!",no_results:"동영상을 찾을 수 없습니다"},
  en:{nav_home:"🏠 Home",nav_album:"📸 Album",nav_chat:"💬 Chat",nav_watch:"▶️ Watch",nav_profile:"👤 Profile",page_title:"▶️ Watch",page_sub:"Search and watch videos",search_ph:"🔍 Search videos...",search_lbl:"Search",results:"results",load_more:"Load more",close:"✕ Close",empty:"🎬 Search for videos!",no_results:"No videos found"}
};

function setLang(l) {
  lang = l; localStorage.setItem("IPRIGHTS_lang",l); localStorage.setItem("site_lang",l);
  var t = I18N[l];
  document.getElementById("nt-home").textContent = t.nav_home;
  document.getElementById("nt-album").textContent = t.nav_album;
  document.getElementById("nt-chat").textContent = t.nav_chat;
  document.getElementById("nt-watch").textContent = t.nav_watch;
  document.getElementById("nt-profile").textContent = t.nav_profile;
  document.getElementById("page-title").textContent = t.page_title;
  document.getElementById("page-sub").textContent = t.page_sub;
  document.getElementById("searchInp").placeholder = t.search_ph;
  document.getElementById("search-lbl").textContent = t.search_lbl;
  document.getElementById("close-lbl").textContent = t.close;
  document.getElementById("emptyState").textContent = t.empty;
  document.getElementById("load-more-lbl").textContent = t.load_more;
  ["vi","kr","en"].forEach(function(x){ document.getElementById("lf-"+x).classList.toggle("on",x===l); });
}

window.onload = function() { setLang(lang); };

document.getElementById("searchInp").addEventListener("keydown",function(e){
  if(e.key==="Enter") doSearch();
});

function switchSource(src) {
  currentSource = src;
  document.getElementById("tab-dm").classList.toggle("on", src==="dm");
  document.getElementById("tab-piped").classList.toggle("on", src==="piped");
  // Nếu đang có kết quả thì tìm lại
  if (currentQ) doSearch();
}

function doSearch() {
  var q = document.getElementById("searchInp").value.trim();
  if (!q) return;
  currentQ = q; nextPage = 1; nextPipedToken = "";
  document.getElementById("resultsGrid").innerHTML = "";
  document.getElementById("loadMoreBtn").style.display = "none";
  document.getElementById("resultsHead").style.display = "none";
  document.getElementById("emptyState").style.display = "none";
  document.getElementById("errorBox").classList.remove("show");
  fetchVideos();
}

function loadMore() {
  if (!isLoading) { nextPage++; fetchVideos(); }
}

function fetchVideos() {
  if (isLoading) return;
  isLoading = true;
  document.getElementById("searchBtn").disabled = true;
  document.getElementById("loading").style.display = "block";

  if (currentSource === "dm") fetchDailymotion();
  else fetchPiped();
}

/* ── DAILYMOTION ────────────────────────────────────── */
function fetchDailymotion() {
  var url = DM_API + "?search=" + encodeURIComponent(currentQ) +
    "&fields=id,title,thumbnail_url,owner.screenname,duration,views_total" +
    "&limit=12&page=" + nextPage + "&language=vi,en,ko";

  fetch(url)
    .then(function(r){ if(!r.ok) throw new Error(); return r.json(); })
    .then(function(data) {
      done();
      if (!data.list || !data.list.length) { showEmpty(); return; }
      showHead(data.total || data.list.length, "kết quả");
      renderDM(data.list);
      document.getElementById("loadMoreBtn").style.display = data.has_more ? "inline-block" : "none";
    })
    .catch(function(){ done(); showError("Dailymotion lỗi! Thử Piped nhé."); });
}

function renderDM(list) {
  var grid = document.getElementById("resultsGrid");
  list.forEach(function(v, i) {
    var card = document.createElement("div");
    card.className = "video-card";
    card.style.animationDelay = (i*0.04)+"s";
    var dur = v.duration ? formatDur(v.duration) : "";
    var views = v.views_total ? formatViews(v.views_total) : "";
    card.innerHTML =
      '<div class="thumb-wrap">' +
        '<img src="'+(v.thumbnail_url||"")+'" loading="lazy" alt="">' +
        '<div class="play-ov"><div class="play-ic">▶</div></div>' +
        '<span class="card-source dm">DM</span>' +
        (dur?'<div style="position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.8);color:#fff;font-size:9px;font-weight:800;padding:2px 5px;border-radius:4px;">'+dur+'</div>':'') +
      '</div>' +
      '<div class="video-info">' +
        '<div class="video-title">'+escHtml(v.title)+'</div>' +
        '<div class="video-channel">📺 '+escHtml(v["owner.screenname"]||"")+'</div>' +
        '<div class="video-meta">'+(views?'👁 '+views:'')+'</div>' +
      '</div>';
    card.onclick = function(){ playDM(v.id, v.title, v["owner.screenname"]||""); };
    grid.appendChild(card);
  });
}

function playDM(id, title, channel) {
  document.getElementById("playerIframe").src =
    "https://www.dailymotion.com/embed/video/" + id + "?autoplay=1";
  document.getElementById("playerTitle").textContent = title;
  document.getElementById("playerChannel").textContent = "📺 " + channel;
  var badge = document.getElementById("playerBadge");
  badge.textContent = "Dailymotion"; badge.className = "src-badge dm";
  document.getElementById("playerWrap").classList.add("show");
  window.scrollTo({top:0,behavior:"smooth"});
}

/* ── PIPED (YouTube proxy) ──────────────────────────── */
function fetchPiped() {
  var url = PIPED_API + "?q=" + encodeURIComponent(currentQ) + "&filter=videos";
  if (nextPipedToken) url += "&nextpage=" + encodeURIComponent(nextPipedToken);

  fetch(url)
    .then(function(r){ if(!r.ok) throw new Error(); return r.json(); })
    .then(function(data) {
      done();
      var items = data.items || [];
      if (!items.length) { showEmpty(); return; }
      nextPipedToken = data.nextpage || "";
      showHead(items.length + "+", "video");
      renderPiped(items);
      document.getElementById("loadMoreBtn").style.display = nextPipedToken ? "inline-block" : "none";
    })
    .catch(function(){ done(); showError("Piped lỗi! Thử Dailymotion nhé."); });
}

function renderPiped(items) {
  var grid = document.getElementById("resultsGrid");
  items.forEach(function(v, i) {
    if (!v.url) return;
    var vid = v.url.replace("/watch?v=","");
    var card = document.createElement("div");
    card.className = "video-card";
    card.style.animationDelay = (i*0.04)+"s";
    var dur = v.duration ? formatDur(v.duration) : "";
    var views = v.views ? formatViews(v.views) : "";
    card.innerHTML =
      '<div class="thumb-wrap">' +
        '<img src="'+(v.thumbnail||"")+'" loading="lazy" alt="">' +
        '<div class="play-ov"><div class="play-ic">▶</div></div>' +
        '<span class="card-source piped">YT</span>' +
        (dur?'<div style="position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.8);color:#fff;font-size:9px;font-weight:800;padding:2px 5px;border-radius:4px;">'+dur+'</div>':'') +
      '</div>' +
      '<div class="video-info">' +
        '<div class="video-title">'+escHtml(v.title||"")+'</div>' +
        '<div class="video-channel">📺 '+escHtml(v.uploaderName||"")+'</div>' +
        '<div class="video-meta">'+(views?'👁 '+views:'')+'</div>' +
      '</div>';
    card.onclick = function(){ playPiped(vid, v.title, v.uploaderName||""); };
    grid.appendChild(card);
  });
}

function playPiped(vid, title, channel) {
  // Thử embed qua piped.video trước
  document.getElementById("playerIframe").src =
    "https://piped.video/embed/" + vid + "?autoplay=1";
  document.getElementById("playerTitle").textContent = title;
  document.getElementById("playerChannel").textContent = "📺 " + channel;
  var badge = document.getElementById("playerBadge");
  badge.textContent = "YouTube/Piped"; badge.className = "src-badge piped";
  document.getElementById("playerWrap").classList.add("show");
  window.scrollTo({top:0,behavior:"smooth"});
}

function closePlayer() {
  document.getElementById("playerIframe").src = "";
  document.getElementById("playerWrap").classList.remove("show");
}

/* ── HELPERS ────────────────────────────────────────── */
function done() {
  document.getElementById("loading").style.display = "none";
  document.getElementById("searchBtn").disabled = false;
  isLoading = false;
}
function showEmpty() {
  document.getElementById("emptyState").style.display = "block";
  document.getElementById("emptyState").textContent = I18N[lang].no_results;
}
function showHead(count, unit) {
  document.getElementById("resultsHead").style.display = "flex";
  document.getElementById("resultsCount").textContent = count + " " + (unit || I18N[lang].results);
}
function showError(msg) {
  var box = document.getElementById("errorBox");
  box.textContent = "❌ " + msg; box.classList.add("show");
}
function formatDur(s) {
  var h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  return h>0 ? h+":"+pad(m)+":"+pad(sec) : m+":"+pad(sec);
}
function pad(n){ return n<10?"0"+n:""+n; }
function formatViews(n) {
  if(n>=1000000) return (n/1000000).toFixed(1)+"M";
  if(n>=1000) return (n/1000).toFixed(0)+"K";
  return n;
}
function escHtml(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
</script>
<script src="bot.js"></script>
</body>
</html>
