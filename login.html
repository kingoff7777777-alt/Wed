<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng nhập | iprights.asia</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--pink:#ff6eb4;--purple:#a855f7;--blue:#38bdf8;--green:#34d399;--bg:#0f0a1e;--card:#16112b;--border:rgba(255,255,255,0.08);--text:#f0eaff;--muted:rgba(240,234,255,0.5);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:65px 16px 60px;overflow-x:hidden;}
body::before{content:'';position:fixed;width:500px;height:500px;border-radius:50%;background:var(--purple);filter:blur(120px);opacity:0.1;top:-200px;left:-200px;pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;width:400px;height:400px;border-radius:50%;background:var(--pink);filter:blur(100px);opacity:0.1;bottom:-150px;right:-150px;pointer-events:none;z-index:0;}
nav{position:fixed;top:0;left:0;right:0;z-index:900;display:flex;justify-content:center;align-items:center;gap:3px;padding:7px 10px;background:rgba(15,10,30,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.nav-a{color:var(--muted);text-decoration:none;font-size:11px;font-weight:800;padding:5px 11px;border-radius:50px;transition:all .25s;border:1px solid transparent;white-space:nowrap;}
.nav-a:hover{color:var(--text);background:rgba(255,255,255,0.07);}
.nav-a.active{color:#fff;background:linear-gradient(135deg,var(--purple),var(--pink));box-shadow:0 3px 14px rgba(168,85,247,0.4);}
.lang-float{display:flex;gap:4px;margin-left:6px;}
.lf-btn{background:none;border:1px solid var(--border);border-radius:50%;width:28px;height:28px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;padding:0;}
.lf-btn:hover{border-color:var(--purple);transform:scale(1.1);}
.lf-btn.on{border-color:var(--purple);background:rgba(168,85,247,0.2);}
.wrap{position:relative;z-index:1;width:100%;max-width:420px;}
.hero{text-align:center;margin-bottom:20px;}
.hero h1{font-size:26px;font-weight:900;background:linear-gradient(135deg,var(--pink),var(--purple),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;}
.hero p{color:var(--muted);font-size:13px;}
.card{background:var(--card);border:1px solid rgba(168,85,247,0.2);border-radius:20px;padding:24px;}
.tabs{display:flex;gap:8px;margin-bottom:20px;}
.tab{flex:1;background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--muted);padding:9px;border-radius:12px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:all .2s;}
.tab.on{background:linear-gradient(135deg,rgba(168,85,247,0.2),rgba(255,110,180,0.2));border-color:rgba(168,85,247,0.4);color:var(--purple);}
.field{margin-bottom:14px;}
.field label{display:block;font-size:10px;font-weight:800;letter-spacing:.15em;text-transform:uppercase;color:var(--purple);margin-bottom:5px;}
.field input{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:11px;color:var(--text);padding:11px 13px;font-family:'Nunito',sans-serif;font-size:14px;outline:none;transition:border-color .2s;}
.field input:focus{border-color:rgba(168,85,247,0.5);}
.btn{width:100%;border:none;padding:13px;border-radius:13px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:all .2s;margin-top:4px;}
.btn-p{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;box-shadow:0 5px 18px rgba(168,85,247,0.4);}
.btn-g{background:linear-gradient(135deg,#10b981,#34d399);color:#fff;box-shadow:0 5px 18px rgba(16,185,129,0.35);}
.btn:hover{transform:translateY(-1px);}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.msg{font-size:13px;font-weight:700;padding:9px 13px;border-radius:10px;margin-bottom:12px;text-align:center;display:none;}
.msg.ok{background:rgba(52,211,153,0.15);color:var(--green);border:1px solid rgba(52,211,153,0.3);display:block;}
.msg.err{background:rgba(255,110,180,0.15);color:var(--pink);border:1px solid rgba(255,110,180,0.3);display:block;}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-a" id="nt-home">🏠 Home</a>
  <a href="album.html" class="nav-a" id="nt-album">📸 Album</a>
  <a href="chat.html" class="nav-a" id="nt-chat">💬 Chat</a>
  <a href="login.html" class="nav-a active" id="nt-login">🔐 Login</a>
  <div class="lang-float">
    <button class="lf-btn" onclick="setLang('vi')" id="lf-vi">🇻🇳</button>
    <button class="lf-btn" onclick="setLang('kr')" id="lf-kr">🇰🇷</button>
    <button class="lf-btn" onclick="setLang('en')" id="lf-en">🇺🇸</button>
  </div>
</nav>
<div class="wrap">
  <div class="hero">
    <h1 id="page-title">🔐 Tài khoản</h1>
    <p id="page-sub">Tham gia cộng đồng iprights.asia</p>
  </div>
  <div class="card">
    <div class="tabs">
      <button class="tab on" id="t1" onclick="showTab('login')">Đăng nhập</button>
      <button class="tab" id="t2" onclick="showTab('reg')">Đăng ký</button>
    </div>
    <div id="msg" class="msg"></div>
    <div id="f-login">
      <div class="field"><label id="lbl-email">Email</label><input type="email" id="lEmail" placeholder="email@example.com"></div>
      <div class="field"><label id="lbl-pw">Mật khẩu</label><input type="password" id="lPw" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="btn btn-p" id="lBtn" onclick="doLogin()">Đăng nhập</button>
    </div>
    <div id="f-reg" style="display:none">
      <div class="field"><label id="lbl-name">Tên hiển thị</label><input type="text" id="rName" placeholder="Tên của bạn..."></div>
      <div class="field"><label>Email</label><input type="email" id="rEmail" placeholder="email@example.com"></div>
      <div class="field"><label id="lbl-pw2">Mật khẩu</label><input type="password" id="rPw" placeholder="Tối thiểu 6 ký tự" onkeydown="if(event.key==='Enter')doReg()"></div>
      <button class="btn btn-g" id="rBtn" onclick="doReg()">Đăng ký</button>
    </div>
  </div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig={apiKey:"AIzaSyC-diM0ASN1ClurHuz8b2lSuyK48Cop2T0",authDomain:"ipright-album.firebaseapp.com",projectId:"ipright-album",storageBucket:"ipright-album.firebasestorage.app",messagingSenderId:"920853312130",appId:"1:920853312130:web:3320ea05146fa7d5b03a9b"};
const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);
const ADMIN="duykhanhneflickr@copyright-limited.com";

onAuthStateChanged(auth,u=>{if(u)location.href="album.html";});

const I18N={
  vi:{tab_login:"Đăng nhập",tab_reg:"Đăng ký",lbl_email:"Email",lbl_pw:"Mật khẩu",lbl_name:"Tên hiển thị",btn_login:"Đăng nhập",btn_reg:"Đăng ký",nav_home:"🏠 Home",nav_album:"📸 Album",nav_chat:"💬 Chat",nav_login:"🔐 Đăng nhập"},
  kr:{tab_login:"로그인",tab_reg:"회원가입",lbl_email:"이메일",lbl_pw:"비밀번호",lbl_name:"표시 이름",btn_login:"로그인",btn_reg:"회원가입",nav_home:"🏠 홈",nav_album:"📸 앨범",nav_chat:"💬 채팅",nav_login:"🔐 로그인"},
  en:{tab_login:"Login",tab_reg:"Sign Up",lbl_email:"Email",lbl_pw:"Password",lbl_name:"Display Name",btn_login:"Login",btn_reg:"Sign Up",nav_home:"🏠 Home",nav_album:"📸 Album",nav_chat:"💬 Chat",nav_login:"🔐 Login"}
};

window.setLang=l=>{
  localStorage.setItem("site_lang",l);
  const t=I18N[l];
  document.getElementById("nt-home").textContent=t.nav_home;
  document.getElementById("nt-album").textContent=t.nav_album;
  document.getElementById("nt-chat").textContent=t.nav_chat;
  document.getElementById("nt-login").textContent=t.nav_login;
  document.getElementById("t1").textContent=t.tab_login;
  document.getElementById("t2").textContent=t.tab_reg;
  document.getElementById("lbl-email").textContent=t.lbl_email;
  document.getElementById("lbl-pw").textContent=t.lbl_pw;
  document.getElementById("lbl-name").textContent=t.lbl_name;
  document.getElementById("lbl-pw2").textContent=t.lbl_pw;
  document.getElementById("lBtn").textContent=t.btn_login;
  document.getElementById("rBtn").textContent=t.btn_reg;
  ["vi","kr","en"].forEach(x=>document.getElementById("lf-"+x).classList.toggle("on",x===l));
};

setLang(localStorage.getItem("site_lang")||"vi");

function msg(type,text){const e=document.getElementById("msg");e.className="msg "+type;e.textContent=text;}

window.showTab=tab=>{
  document.getElementById("f-login").style.display=tab==="login"?"block":"none";
  document.getElementById("f-reg").style.display=tab==="reg"?"block":"none";
  document.getElementById("t1").classList.toggle("on",tab==="login");
  document.getElementById("t2").classList.toggle("on",tab==="reg");
  document.getElementById("msg").className="msg";
};

window.doLogin=async()=>{
  const email=document.getElementById("lEmail").value.trim();
  const pw=document.getElementById("lPw").value;
  if(!email||!pw){msg("err","⚠️ Nhập đủ thông tin!");return;}
  const btn=document.getElementById("lBtn");btn.disabled=true;btn.textContent="⏳...";
  try{await signInWithEmailAndPassword(auth,email,pw);msg("ok","✅ Thành công!");}
  catch(e){msg("err","❌ Email hoặc mật khẩu không đúng!");btn.disabled=false;btn.textContent=I18N[localStorage.getItem("site_lang")||"vi"].btn_login;}
};

window.doReg=async()=>{
  const name=document.getElementById("rName").value.trim();
  const email=document.getElementById("rEmail").value.trim();
  const pw=document.getElementById("rPw").value;
  if(!name){msg("err","⚠️ Nhập tên!");return;}
  if(!email){msg("err","⚠️ Nhập email!");return;}
  if(pw.length<6){msg("err","⚠️ Mật khẩu tối thiểu 6 ký tự!");return;}
  const btn=document.getElementById("rBtn");btn.disabled=true;btn.textContent="⏳...";
  try{
    const cred=await createUserWithEmailAndPassword(auth,email,pw);
    await updateProfile(cred.user,{displayName:name});
    await setDoc(doc(db,"users",cred.user.uid),{name,email,role:email===ADMIN?"admin":"user",createdAt:new Date().toISOString(),banned:false});
    msg("ok","✅ Đăng ký thành công!");
  }catch(e){
    msg("err","❌ "+(e.code==="auth/email-already-in-use"?"Email đã được dùng!":e.message));
    btn.disabled=false;btn.textContent=I18N[localStorage.getItem("site_lang")||"vi"].btn_reg;
  }
};
</script>
</body>
</html>
